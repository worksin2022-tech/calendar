            if (iso) s.deptDates[modalDept] = iso; else delete s.deptDates[modalDept];
          } else {
            s.date = iso || null;
          }
        }
      });
      dateField.title = modalDept
        ? `วันที่ของตู้นี้สำหรับแผนก ${(getDept(modalDept) || {}).name || ""} (ไม่ใส่ = ตามวันของแผนก)`
        : "วันที่ของตู้นี้ (ไม่ใส่ = ตามวันโปรเจค)";
      row.querySelector(".subtask-date-mount").replaceWith(dateField);

      const paintProg = () => {
        const p = checklistProgress(s, modalDept);
        progBar.style.width = p.pct + "%";
        progBar.style.background = p.pct === 100 ? "#10b981" : "var(--accent)";
        paintClBtn(clBtn, s);
      };
      paintProg();
      paintDot(dotBtn, cur);

      dotBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        openStatusPopover(dotBtn, s.statusId, (newId) => {
          s.statusId = newId;
          const ns = getStatus(newId);
          paintDot(dotBtn, ns);
          row.classList.toggle("done", isStatusDone(ns));
        });
      });
      const openCl = () => openChecklistPopover(clBtn, s, paintProg, { task, deptId: modalDept });
      clBtn.addEventListener("click", (e) => { e.stopPropagation(); openCl(); });
      clBtn.addEventListener("mouseenter", openCl);
      txt.addEventListener("input", () => { s.text = txt.value; });
      txt.addEventListener("keydown", (e) => {
        if (e.key === "Enter") { e.preventDefault(); addSub(""); setTimeout(() => { subWrap.lastChild?.querySelector('input[type=text]')?.focus(); }, 0); }
      });
      del.addEventListener("click", async () => {
        const ok = await confirmDialog({
          title: "ลบตู้นี้?",
          message: `“${s.text || "ตู้นี้"}” จะถูกลบ พร้อม checklist ของตู้`,
          confirmText: "ลบตู้", icon: "🗑️",
        });
        if (!ok) return;
        const idx = task.subtasks.indexOf(s);
        if (idx >= 0) task.subtasks.splice(idx, 1);
        renderSubs();
      });
      subWrap.appendChild(row);
    });
  }
  function addSub(text) {
    task.subtasks = task.subtasks || [];
    task.subtasks.push({ id: uid("st"), text, statusId: state.statuses[0]?.id, date: null, checklist: makeCabinetChecklist() });
    renderSubs();
  }
  renderSubs();
  modal.querySelector('[data-act="add-sub"]').addEventListener("click", () => { addSub(""); subWrap.lastChild?.querySelector('input[type=text]')?.focus(); });

  // department stages (ด่านส่งต่อแผนก)
  const stageWrap = modal.querySelector('[data-stages]');
  if (!Array.isArray(task.deptStages)) task.deptStages = [];
  function renderStages() {
    stageWrap.innerHTML = "";
    if ((state.departments || []).length === 0) {
      stageWrap.innerHTML = `<div class="muted" style="font-size:12px">ยังไม่มีแผนก — เพิ่มได้ที่ ⚙ ตั้งค่า › แผนก</div>`;
      return;
    }
    task.deptStages.forEach((stg, i) => {
      const dept = getDept(stg.deptId) || state.departments[0];
      const usesChecklist = deptUsesChecklist(task, stg.deptId);
      const dp = deptProgress(task, stg.deptId);
      const deptDone = isDeptComplete(task, stg.deptId);
      const row = document.createElement("div");
      row.className = "stage-row" + (deptDone ? " done" : "");
      const optsHtml = state.departments.map(d =>
        `<option value="${d.id}" ${d.id===stg.deptId?"selected":""}>${escapeHtml(d.name)}</option>`).join("");
      // checklist depts: show derived progress (auto-done); others: manual tick
      const control = usesChecklist
        ? `<span class="stage-prog${deptDone?' full':''}" title="เสร็จอัตโนมัติเมื่อติ๊ก checklist ของแผนกนี้ครบทุกตู้">${dp.done}/${dp.total} ✓</span>`
        : `<label class="stage-done-toggle" title="ติ๊กเมื่อแผนกนี้ทำงานเสร็จ"><input type="checkbox" ${stg.done ? "checked" : ""} /> เสร็จ</label>`;
      row.innerHTML = `
        <span class="stage-dept-dot" style="background:${dept.color}"></span>
        <select class="stage-dept">${optsHtml}</select>
        <span class="stage-date-mount"></span>
        ${control}
        <button class="subtask-del" title="ลบด่าน">✕</button>
      `;
      const deptSel = row.querySelector(".stage-dept");
      const dot = row.querySelector(".stage-dept-dot");
      const doneCb = row.querySelector(".stage-done-toggle input");
      const del = row.querySelector(".subtask-del");
      // date field (blocked depts can't be set later than the anchor dept)
      const df = createDateField({ value: stg.due, allowClear: true, extraClass: "datefield-sm",
        onChange: (iso) => {
          if (iso) {
            const max = dateLimitViolation(task, stg.deptId, iso, null);
            if (max) { toast(dateLimitMsg(stg.deptId, max)); df.setValue(stg.due || null); return; }
          }
          stg.due = iso || null;
        } });
      row.querySelector(".stage-date-mount").replaceWith(df);
      // dept change → recompute control (checklist vs manual)
      deptSel.addEventListener("change", () => {
        stg.deptId = deptSel.value;
        renderStages();
      });
      // manual department done tick (only for depts without a checklist)
      if (doneCb) doneCb.addEventListener("change", () => { stg.done = doneCb.checked; row.classList.toggle("done", doneCb.checked); });
      del.addEventListener("click", () => { task.deptStages.splice(i, 1); renderStages(); });
      stageWrap.appendChild(row);
    });
    renderExtraFields();   // custom dropdown fields live in their own card, keyed off the current stages
  }
  // "ข้อมูลเพิ่มเติม" card(s): custom dropdown fields, grouped per department, value stored on stg.fields.
  // Shown only for the user's own department (modalDept); planners (no own dept) see every department that has fields.
  const extraBlock = modal.querySelector('[data-extra-field-block]');
  const extraWrap = modal.querySelector('[data-extra-fields]');
  function renderExtraFields() {
    extraWrap.innerHTML = "";
    const relevant = (task.deptStages || []).filter(stg =>
      (!modalDept || stg.deptId === modalDept) && deptFields(stg.deptId).length > 0);
    if (relevant.length === 0) { extraBlock.style.display = "none"; return; }
    extraBlock.style.display = "";
    relevant.forEach(stg => {
      const dept = getDept(stg.deptId) || { name: "?", color: "#888" };
      if (!stg.fields || typeof stg.fields !== "object") stg.fields = {};
      const card = document.createElement("div");
      card.className = "extra-card";
      card.innerHTML = `<div class="extra-card-head"><span class="stage-dept-dot" style="background:${dept.color}"></span>ข้อมูลเพิ่มเติม · ${escapeHtml(dept.name)}</div>`;
      const fieldList = deptFields(stg.deptId);
      const rowsEl = document.createElement("div");
      rowsEl.className = "extra-rows" + (fieldList.length >= 4 ? " cols-2" : "");  // many fields → 2 columns
      fieldList.forEach(f => {
        const cur = stg.fields[f.id] || "";
        const groupsHtml = (f.groups || []).map(g => {
          const opts = (g.options || []).filter(o => o.label !== undefined)
            .map(o => `<option value="${o.id}" ${o.id === cur ? "selected" : ""}>${escapeHtml(o.label)}</option>`).join("");
          if (!opts) return "";
          return g.name ? `<optgroup label="${escapeHtml(g.name)}">${opts}</optgroup>` : opts;
        }).join("");
        const rowEl = document.createElement("label");
        rowEl.className = "extra-row";
        rowEl.innerHTML = `<span class="extra-row-name" title="${escapeHtml(f.name)}">${escapeHtml(f.name || "(ฟิลด์)")}</span><select><option value="">— ไม่ระบุ —</option>${groupsHtml}</select>`;
        const sel = rowEl.querySelector("select");
        sel.value = cur;
        sel.addEventListener("change", () => { if (sel.value) stg.fields[f.id] = sel.value; else delete stg.fields[f.id]; });
        rowsEl.appendChild(rowEl);
      });
      card.appendChild(rowsEl);
      extraWrap.appendChild(card);
    });
  }
  function addStage() {
    // pick first department not yet used, else the first
    const used = new Set(task.deptStages.map(s => s.deptId));
    const dept = (state.departments || []).find(d => !used.has(d.id)) || (state.departments || [])[0];
    if (!dept) { alert("ยังไม่มีแผนก — เพิ่มได้ที่ ⚙ ตั้งค่า › แผนก"); return; }
    task.deptStages.push({ deptId: dept.id, due: null, done: false });
    renderStages();
  }
  renderStages();
  modal.querySelector('[data-act="add-stage"]').addEventListener("click", addStage);

  // ----- Activity / comments panel (right side) -----
  if (!Array.isArray(task.comments)) task.comments = [];
  const feedEl = modal.querySelector('[data-feed]');
  const commentInput = modal.querySelector('[data-comment]');
  function persistComments() {
    // comments persist immediately for existing tasks (independent of Save/Cancel)
    if (!isNew) {
      const real = state.tasks.find(t => t.id === task.id);
      if (real) { real.comments = JSON.parse(JSON.stringify(task.comments)); saveState(); }
    }
  }
  function renderFeed() {
    if (!task.comments.length) {
      feedEl.innerHTML = `<div class="ta-empty">ยังไม่มีความเคลื่อนไหว<br>เขียนอัพเดต หรือเปลี่ยนสถานะ/ติ๊กเสร็จ<br>แล้วระบบจะบันทึกให้ดูย้อนหลัง</div>`;
      return;
    }
    feedEl.innerHTML = "";
    const sorted = [...task.comments].sort((a, b) => (a.at || 0) - (b.at || 0));
    sorted.forEach((c) => {
      if (c.type === "system") {
        const sys = document.createElement("div");
        sys.className = "ta-sys";
        sys.innerHTML = `
          <span class="ta-sys-dot"></span>
          <span class="ta-sys-text">${c.author ? `<span class="ta-sys-author">${escapeHtml(c.author)}</span> ` : ""}${escapeHtml(c.text)}</span>
          <span class="ta-sys-time">${formatDateTimeTH(c.at)}</span>`;
        feedEl.appendChild(sys);
        return;
      }
      if (c.type === "alert") {
        const dept = getDept(c.toDept) || { name: c.toDept || "?" };
        const al = document.createElement("div");
        al.className = "ta-alert" + (c.ack ? " acked" : "");
        al.innerHTML = `
          <div class="ta-alert-head">
            <span class="ta-alert-badge">🔔 แจ้งเตือน → ${escapeHtml(dept.name)}</span>
            <span class="ta-author">${escapeHtml(c.author || "คุณ")}</span>
            <span class="ta-alert-time">${formatDateTimeTH(c.at)}</span>
            <button class="ta-del" title="ลบ">✕</button>
          </div>
          ${c.text ? `<div class="ta-alert-text">${escapeHtml(c.text)}</div>` : ""}
          ${c.photo ? `<img class="ta-photo" src="${c.photo}" alt="แนบรูป">` : ""}
          ${c.ack ? `<div class="ta-alert-ack">✓ รับทราบแล้วโดย ${escapeHtml(c.ackBy || "—")} · ${formatDateTimeTH(c.ackAt)}</div>` : ""}
          ${(!c.ack && state.settings.myDept && state.settings.myDept === c.toDept) ? `<button class="btn btn-sm btn-ack ta-alert-ackbtn" data-ackbtn>✓ รับทราบ</button>` : ""}
          <div class="alert-replies" data-replies></div>`;
        al.querySelector(".ta-del").addEventListener("click", () => {
          task.comments = task.comments.filter(x => x.id !== c.id);
          persistComments(); renderFeed(); renderBell();
        });
        const ph = al.querySelector(".ta-photo");
        if (ph) ph.addEventListener("click", () => openPhotoLightbox(c.photo));
        // ack button — only the targeted department sees it
        const ackBtn = al.querySelector("[data-ackbtn]");
        if (ackBtn) ackBtn.addEventListener("click", () => {
          c.ack = true; c.ackBy = currentUser(); c.ackAt = Date.now();
          logActivity(task, `รับทราบการแจ้งเตือน (${dept.name})`);
          persistComments(); renderFeed(); renderBell();
        });
        // reply thread (c is the modal's comment copy → persistComments syncs to storage)
        buildAlertReplies(al.querySelector("[data-replies]"), task, c, () => { persistComments(); });
        feedEl.appendChild(al);
        return;
      }
      const author = c.author || "คุณ";
      const item = document.createElement("div");
      item.className = "ta-item";
      item.innerHTML = `
        <div class="ta-avatar">${escapeHtml(author.slice(0,1))}</div>
        <div class="ta-item-body">
          <div class="ta-item-head">
            <span class="ta-author">${escapeHtml(author)}</span>
            <span class="ta-time">${formatDateTimeTH(c.at)}</span>
            <button class="ta-del" title="ลบ">✕</button>
          </div>
          ${c.text ? `<div class="ta-text">${escapeHtml(c.text)}</div>` : ""}
          ${c.photo ? `<img class="ta-photo" src="${c.photo}" alt="แนบรูป">` : ""}
        </div>`;
      item.querySelector(".ta-del").addEventListener("click", () => {
        task.comments = task.comments.filter(x => x.id !== c.id);
        persistComments(); renderFeed();
      });
      const cph = item.querySelector(".ta-photo");
      if (cph) cph.addEventListener("click", () => openPhotoLightbox(c.photo));
      feedEl.appendChild(item);
    });
    feedEl.scrollTop = feedEl.scrollHeight;
  }
  function autoGrow() {
    commentInput.style.height = "auto";
    commentInput.style.height = Math.min(commentInput.scrollHeight, 120) + "px";
  }
  // photo attach + alert-target department for the composer
  let pendingPhoto = null;
  const photoInput = modal.querySelector('[data-photo-input]');
  const photoPreview = modal.querySelector('[data-photo-preview]');
  const alertSel = modal.querySelector('[data-alert-dept]');
  alertSel.innerHTML = `<option value="">🔔 ไม่แจ้งเตือน</option>` +
    (state.departments || []).map(d => `<option value="${d.id}">แจ้งเตือน → ${escapeHtml(d.name)}</option>`).join("");
  alertSel.addEventListener("change", () => alertSel.classList.toggle("armed", !!alertSel.value));
  function renderPhotoPreview() {
    if (!pendingPhoto) { photoPreview.hidden = true; photoPreview.innerHTML = ""; return; }
    photoPreview.hidden = false;
    photoPreview.innerHTML = `<img src="${pendingPhoto}" alt="ตัวอย่างรูป"><button type="button" class="ta-photo-rm" title="เอารูปออก">✕</button>`;
    photoPreview.querySelector(".ta-photo-rm").addEventListener("click", () => { pendingPhoto = null; renderPhotoPreview(); });
  }
  modal.querySelector('[data-act="attach"]').addEventListener("click", () => photoInput.click());
  photoInput.addEventListener("change", async () => {
    const file = photoInput.files && photoInput.files[0];
    photoInput.value = "";
    if (!file) return;
    try {
      pendingPhoto = await compressImage(file);
      renderPhotoPreview();
    } catch (e) { toast("อ่านรูปไม่สำเร็จ ลองใหม่อีกครั้ง"); }
  });
  function postComment() {
    const text = commentInput.value.trim();
    const toDept = alertSel.value;
    if (!text && !pendingPhoto) return;   // need a message or a photo
    if (toDept) {
      const dept = getDept(toDept) || { name: toDept };
      task.comments.push({ id: uid("al"), type: "alert", author: currentUser(), toDept, text, photo: pendingPhoto || null, at: Date.now(), ack: false });
      toast(`ส่งแจ้งเตือนไปแผนก “${dept.name}” แล้ว`);
      pushNotify("alert", `🔔 แจ้งเตือนถึงแผนก ${dept.name}`, `${task.title}: ${text || "(แนบรูป)"}`, "al-" + task.id);
    } else {
      task.comments.push({ id: uid("cm"), author: currentUser(), text, photo: pendingPhoto || null, at: Date.now() });
      if (taskRelevantToMe(task)) pushNotify("comment", "💬 คอมเมนต์ใหม่", `${task.title} · ${currentUser()}: ${text || "(รูป)"}`, "cm-" + task.id);
    }
    commentInput.value = ""; pendingPhoto = null; alertSel.value = ""; alertSel.classList.remove("armed");
    renderPhotoPreview(); autoGrow();
    persistComments(); renderFeed(); renderBell();
  }
  commentInput.addEventListener("input", autoGrow);
  commentInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); postComment(); }
  });
  modal.querySelector('[data-act="send-comment"]').addEventListener("click", postComment);
  renderFeed();

  // actions
  function close() { overlay.remove(); }
  overlay.addEventListener("click", (e) => { if (e.target === overlay) close(); });
  modal.querySelectorAll('[data-act="close"]').forEach(b => b.addEventListener("click", close));
  modal.querySelector('[data-act="dashboard"]')?.addEventListener("click", () => openProjectDashboard(task.id));
  modal.querySelector('[data-act="save"]').addEventListener("click", () => {
    task.title = modal.querySelector('[data-f="title"]').value.trim();
    task.description = modal.querySelector('[data-f="description"]').value;
    const due = dueField.getValue() || todayIso();
    const start = startField.getValue();
    if (start && start > due) {
      alert("วันเริ่มต้องไม่หลังวันครบกำหนด");
      return;
    }
    task.date = due;
    task.startDate = start || null;
    if (!task.title) { alert("กรุณาใส่ชื่องาน"); return; }
    task.updatedAt = Date.now();
    // auto activity log: record what changed
    diffTaskActivity(beforeSnapshot, task).forEach(text => logActivity(task, text));
    if (isNew) state.tasks.push(task);
    else {
      const idx = state.tasks.findIndex(t => t.id === task.id);
      if (idx >= 0) state.tasks[idx] = task;
    }
    saveState();
    notifyTaskDiff(beforeSnapshot, task);   // browser notifications for status/done changes made in the modal
    close();
    renderAll();
  });
  const delBtn = modal.querySelector('[data-act="delete"]');
  if (delBtn) {
    delBtn.addEventListener("click", async () => {
      const ok = await confirmDialog({
        title: "ลบงานนี้?",
        message: `“${task.title || "งานนี้"}” จะถูกลบถาวร พร้อมตู้และ checklist ทั้งหมด — ย้อนกลับไม่ได้`,
        confirmText: "ลบงาน",
      });
      if (!ok) return;
      state.tasks = state.tasks.filter(t => t.id !== task.id);
      saveState();
      close();
      renderAll();
    });
  }
  const dupBtn = modal.querySelector('[data-act="duplicate"]');
  if (dupBtn) {
    dupBtn.addEventListener("click", async () => {
      const ok = await confirmDialog({
        title: `ทำซ้ำ “${task.title || "งานนี้"}”?`,
        message: "สร้างสำเนาใหม่ (โครงสร้างตู้/ด่านแผนก/วันเดิม) โดยรีเซ็ตความคืบหน้า — สถานะกลับเริ่มต้น, ล้างติ๊ก checklist และ Activity",
        confirmText: "ทำซ้ำ",
        danger: false,
        icon: "⧉",
      });
      if (!ok) return;
      // duplicate from the SAVED task (predictable; ignores unsaved edits in this modal)
      const src = state.tasks.find(t => t.id === task.id) || task;
      const copy = duplicateTask(src);
      state.tasks.push(copy);
      saveState();
      close();
      renderAll();
      openTaskModal(copy.id);   // open the new copy for editing right away
    });
  }

  // focus title
  setTimeout(() => modal.querySelector('[data-f="title"]').focus(), 50);
}

/* ---------- Day detail modal (when many tasks) ---------- */
function taskCoversDate(t, iso) {
  if (!t.date) return false;
  const start = (t.startDate && t.startDate < t.date) ? t.startDate : t.date;
  return iso >= start && iso <= t.date;
}

function openDayModal(dateIso) {
  const filter = currentFilter();
  const pass = matchesFilter(filter);
  const vds = activeViewDepts();
  const inDept = vds.length > 0;

  let dayTasks;
  const dayCabs = [];
  if (inDept) {
    dayTasks = state.tasks.filter(pass).filter(t => vds.some(d => { const s = taskStage(t, d); return s && s.due === dateIso; }));
  } else {
    dayTasks = state.tasks.filter(t => taskCoversDate(t, dateIso)).filter(pass);
    state.tasks.filter(pass).forEach(t => {
      (t.subtasks || []).forEach(s => { if (s.date === dateIso) dayCabs.push({ task: t, sub: s }); });
    });
  }

  const projHtml = dayTasks.map(t => {
    const st = getStatus(t.statusId); // shared status
    const pr = getPriority(t.priority);
    const totalSub = (t.subtasks||[]).length;
    const doneSub = (t.subtasks||[]).filter(subtaskDone).length;
    // in dept view: which selected departments are due on this day for this task
    const matchedDepts = inDept ? vds.filter(d => { const s = taskStage(t, d); return s && s.due === dateIso; }).map(d => (getDept(d)||{}).name).join(", ") : "";
    const meta = inDept
      ? `${escapeHtml(matchedDepts)} · สถานะงาน: ${escapeHtml(st.name)}`
      : `${t.startDate && t.startDate !== t.date ? `📅 ${formatDateTH(t.startDate)} → ${formatDateTH(t.date)} · ` : ""}${escapeHtml(st.name)}${totalSub>0?` · ${doneSub}/${totalSub} ตู้`:""}${(t.labels||[]).length?` · ${(t.labels||[]).map(l=>"#"+escapeHtml(l)).join(" ")}`:""}`;
    return `
      <div class="day-task" data-id="${t.id}"
           style="--chip-bg:${hexToBgTint(st.color)};--chip-color:${st.color}">
        <div class="day-task-title">${pr.id!=="none"?priFlag(pr)+" ":""}${escapeHtml(t.title)}</div>
        <div class="day-task-meta">${meta}</div>
      </div>`;
  }).join("");

  const cabHtml = dayCabs.map(({task, sub}) => {
    const st = getStatus(sub.statusId);
    return `
      <div class="day-task" data-id="${task.id}"
           style="--chip-bg:${hexToBgTint(st.color)};--chip-color:${st.color}">
        <div class="day-task-title">
          <span class="proj-dot" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${projHashColor(task.title)};margin-right:6px"></span>
          ${escapeHtml(sub.text || "(ไม่มีชื่อตู้)")}
        </div>
        <div class="day-task-meta">${escapeHtml(task.title)} · ${escapeHtml(st.name)}</div>
      </div>`;
  }).join("");

  const overlay = document.createElement("div");
  overlay.className = "overlay";
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-head">
        <h3>งานวันที่ ${formatDateTH(dateIso)}</h3>
        <button class="btn btn-ghost" data-act="close">✕</button>
      </div>
      <div class="modal-body">
        ${(dayTasks.length === 0 && dayCabs.length === 0) ? `<div class="empty">ไม่มีงานในวันนี้</div>` : ""}
        ${dayTasks.length ? `<div class="day-tasks">${projHtml}</div>` : ""}
        ${dayCabs.length ? `<div class="tp-section-label" style="padding-left:0">ตู้ที่กำหนดวันนี้<span class="tp-section-count">${dayCabs.length}</span></div><div class="day-tasks">${cabHtml}</div>` : ""}
      </div>
      <div class="modal-foot">
        <div style="flex:1"></div>
        <button class="btn" data-act="close">ปิด</button>
        <button class="btn btn-primary" data-act="add">+ เพิ่มงานวันนี้</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  function close() { overlay.remove(); }
  overlay.addEventListener("click", (e) => { if (e.target === overlay) close(); });
  overlay.querySelectorAll('[data-act="close"]').forEach(b => b.addEventListener("click", close));
  overlay.querySelector('[data-act="add"]').addEventListener("click", () => { close(); openTaskModal(null, { date: dateIso }); });
  overlay.querySelectorAll(".day-task").forEach(el => {
    el.addEventListener("click", () => { close(); openTaskModal(el.dataset.id); });
  });
}

function pad2(n) { return String(n).padStart(2, "0"); }
// dd/mm/yyyy (ปี พ.ศ.)
function formatDateTH(iso) {
  const d = fromIso(iso);
  return `${pad2(d.getDate())}/${pad2(d.getMonth()+1)}/${d.getFullYear()+543}`;
}
function formatDateFullTH(iso) {
  const d = fromIso(iso);
  return `วัน${TH_DAYS[d.getDay()]}ที่ ${formatDateTH(iso)}`;
}
function addDaysIso(iso, n) { const d = fromIso(iso); d.setDate(d.getDate() + n); return isoDate(d); }
// "ต้องเสร็จวันนี้" day navigation: reference day + relative Thai labels for the current offset
const TP_REL = { "0": "วันนี้", "1": "พรุ่งนี้", "2": "มะรืนนี้", "-1": "เมื่อวาน", "-2": "เมื่อวานซืน" };
function tpRefDay() { return addDaysIso(todayIso(), tpDayOffset); }
function tpDayWord() { return TP_REL[String(tpDayOffset)] || ("วัน" + TH_DAYS[fromIso(tpRefDay()).getDay()]); } // short word for the stepper
function tpWhen() { return TP_REL[String(tpDayOffset)] || formatDateFullTH(tpRefDay()); }                     // for inline sentences
function tpDueLabel() { return "ครบกำหนด" + tpWhen(); }                                                       // section header

/* ---------- Today panel ---------- */
/* In V1: task = project, subtask = cabinet.
   This panel lists cabinets that must be finished today (+ overdue),
   grouped by project. Status of each cabinet can be changed inline. */
function taskCabProgress(t) {
  const subs = t.subtasks || [];
  if (subs.length === 0) {
    const done = isStatusDone(getStatus(t.statusId));
    return { done: done ? 1 : 0, total: 1, hasSubs: false };
  }
  return { done: subs.filter(subtaskDone).length, total: subs.length, hasSubs: true };
}
function taskComplete(t) {
  const p = taskCabProgress(t);
  return p.done >= p.total;
}
/* effective date of a cabinet: its own date, else the parent project's due date */
function cabEffDate(t, s) { return (s && s.date) ? s.date : t.date; }
function formatDateShort(iso) {
  const d = fromIso(iso);
  return `${pad2(d.getDate())}/${pad2(d.getMonth()+1)}/${d.getFullYear()+543}`;
}
function formatDateTimeTH(ts) {
  const d = new Date(ts);
  return `${pad2(d.getDate())}/${pad2(d.getMonth()+1)}/${d.getFullYear()+543} ${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
}

/* ---------- Activity logging ---------- */
// name of the person acting now (placeholder until multi-user login in phase 2)
function currentUser() {
  return (state.settings && state.settings.currentUser || "").trim() || "ผู้ใช้";
}
// append a system activity entry to a task's feed (records who did it)
function logActivity(task, text) {
  if (!task) return;
  if (!Array.isArray(task.comments)) task.comments = [];
  task.comments.push({ id: uid("ac"), type: "system", author: currentUser(), text, at: Date.now() });
}
// compare a task before/after editing in the modal -> list of activity messages
function diffTaskActivity(before, after) {
  const logs = [];
  if (!before) { logs.push("สร้างงาน"); return logs; }
  if (before.statusId !== after.statusId)
    logs.push(`เปลี่ยนสถานะ: ${getStatus(before.statusId).name} → ${getStatus(after.statusId).name}`);
  if (before.date !== after.date)
    logs.push(`เปลี่ยนวันครบกำหนด → ${formatDateTH(after.date)}`);
  if ((before.startDate || null) !== (after.startDate || null))
    logs.push(after.startDate ? `ตั้งวันเริ่ม → ${formatDateTH(after.startDate)}` : "ลบวันเริ่ม");
  if (before.priority !== after.priority)
    logs.push(`เปลี่ยนความสำคัญ → ${getPriority(after.priority).label}`);
  // department stages
  const bS = before.deptStages || [], aS = after.deptStages || [];
  aS.forEach(s => {
    const b = bS.find(x => x.deptId === s.deptId);
    const dn = (getDept(s.deptId) || {}).name || s.deptId;
    if (!b) logs.push(`เพิ่มด่านแผนก ${dn}`);
    else {
      if (!b.done && s.done) logs.push(`✓ แผนก ${dn} เสร็จ`);
      if (b.done && !s.done) logs.push(`ยกเลิกเสร็จ แผนก ${dn}`);
      if ((b.due || null) !== (s.due || null) && s.due) logs.push(`ตั้งกำหนดแผนก ${dn} → ${formatDateTH(s.due)}`);
      // custom dropdown field value changes on this stage
      deptFields(s.deptId).forEach(f => {
        const bv = (b.fields || {})[f.id] || null, av = (s.fields || {})[f.id] || null;
        if (bv === av) return;
        const lbl = av ? ((findFieldOption(f, av) || {}).label || "?") : null;
        logs.push(av ? `${dn} · ${f.name}: ${lbl}` : `${dn} · ล้าง ${f.name}`);
      });
    }
  });
  bS.forEach(b => { if (!aS.find(x => x.deptId === b.deptId)) logs.push(`ลบด่านแผนก ${(getDept(b.deptId) || {}).name || b.deptId}`); });
  // cabinets (subtasks)
  const bSub = before.subtasks || [], aSub = after.subtasks || [];
  aSub.forEach(s => {
    const b = bSub.find(x => x.id === s.id);
    if (!b) { logs.push(`เพิ่มตู้: ${s.text || "(ไม่มีชื่อ)"}`); return; }
    if (b.statusId !== s.statusId) {
      const ns = getStatus(s.statusId);
      if (isStatusDone(ns) && !isStatusDone(getStatus(b.statusId))) logs.push(`ตู้ “${s.text || "(ไม่มีชื่อ)"}” เสร็จ`);
      else logs.push(`ตู้ “${s.text || "(ไม่มีชื่อ)"}” → ${ns.name}`);
    }
  });
  bSub.forEach(b => { if (!aSub.find(x => x.id === b.id)) logs.push(`ลบตู้: ${b.text || "(ไม่มีชื่อ)"}`); });
  return logs;
}
function tpSectionLabel(text, count, danger) {
  const d = document.createElement("div");
  d.className = "tp-section-label" + (danger ? " danger" : "");
  d.innerHTML = `<span>${text}</span><span class="tp-section-count">${count}</span>`;
  return d;
}
/* one cabinet row for the today panel: status dot + name + checklist + date
   (sub === null => the project itself, when it has no cabinets) */
function buildTpCabRow(t, sub, ed, today, deptId) {
  const cur = sub ? getStatus(sub.statusId) : getStatus(t.statusId);
  const done = isStatusDone(cur);
  const overdue = ed < today;
  const overdueDays = overdue ? Math.round((fromIso(today) - fromIso(ed)) / 86400000) : 0;
  const name = sub ? (sub.text || "(ไม่มีชื่อตู้)") : "(ทั้งโปรเจค — ยังไม่มีตู้)";
  const clp = sub ? checklistProgress(sub, deptId) : { done:0, total:0, pct:0 };
  // in a department view, only show the checklist button if that dept has items for this cabinet
  const showCl = sub && (deptId ? clp.total > 0 : (sub.checklist || []).length > 0);
  const row = document.createElement("div");
  row.className = "tp-cab-row" + (done ? " done" : "");
  row.innerHTML = `
    <button type="button" class="subtask-dot" style="--st-color:${cur.color}" title="${escapeHtml(cur.name)}"></button>
    <span class="tp-cab-name">${escapeHtml(name)}</span>
    ${showCl ? `<button type="button" class="tp-cl-btn${clp.total>0&&clp.done===clp.total?' full':''}" title="Checklist ${deptId ? 'แผนกนี้' : 'ของตู้'}">☑ <span class="cl-count">${clp.done}/${clp.total}</span></button>` : ""}
    <span class="tp-cab-date${overdue ? " overdue" : ""}">${overdue ? `เลย ${overdueDays} วัน` : formatDateShort(ed)}</span>
  `;
  const dot = row.querySelector(".subtask-dot");
  dot.addEventListener("click", (e) => {
    e.stopPropagation();
    const targetId = sub ? sub.statusId : t.statusId;
    openStatusPopover(dot, targetId, (id) => {
      const oldId = sub ? sub.statusId : t.statusId;
      if (sub) sub.statusId = id; else t.statusId = id;
      const ns = getStatus(id);
      if (sub) logActivity(t, (isStatusDone(ns) && !isStatusDone(getStatus(oldId))) ? `ตู้ “${sub.text || "(ไม่มีชื่อ)"}” เสร็จ` : `ตู้ “${sub.text || "(ไม่มีชื่อ)"}” → ${ns.name}`);
      else logActivity(t, `เปลี่ยนสถานะ: ${getStatus(oldId).name} → ${ns.name}`);
      notifyStatusChange(t, sub || null, oldId, id);
      t.updatedAt = Date.now(); saveState(); renderAll();
    });
  });
  if (showCl) {
    const clBtn = row.querySelector(".tp-cl-btn");
    const openCl = () => openChecklistPopover(clBtn, sub, () => {
      const p = checklistProgress(sub, deptId);
      clBtn.querySelector(".cl-count").textContent = `${p.done}/${p.total}`;
      clBtn.classList.toggle("full", p.total > 0 && p.done === p.total);
      t.updatedAt = Date.now();
      saveState();
    }, { deptId, task: t });
    clBtn.addEventListener("click", (e) => { e.stopPropagation(); openCl(); });
    clBtn.addEventListener("mouseenter", openCl);
  }
  row.addEventListener("click", () => openTaskModal(t.id));
  return row;
}

/* entry = { task, cabs: [{ sub, ed }] }  (sub === null => project itself, no cabinets) */
function renderTpGroup(entry, today) {
  const t = entry.task;
  const st = getStatus(t.statusId);
  const prog = taskCabProgress(t);
  const pr = getPriority(t.priority);

  const wrap = document.createElement("div");
  wrap.className = "tp-group";

  const head = document.createElement("div");
  head.className = "tp-group-head";
  head.innerHTML = `
    <button type="button" class="subtask-dot" style="--st-color:${st.color}" title="สถานะโปรเจค: ${escapeHtml(st.name)}"></button>
    <span class="tp-group-title">${pr.id !== "none" ? priFlag(pr) + " " : ""}${escapeHtml(t.title)}</span>
    ${alertPin(t)}
    <span class="tp-group-badge">${prog.done}/${prog.total}</span>
  `;
  const headDot = head.querySelector(".subtask-dot");
  headDot.addEventListener("click", (e) => {
    e.stopPropagation();
    openStatusPopover(headDot, t.statusId, (id) => {
      const oldId = t.statusId;
      t.statusId = id;
      logActivity(t, `เปลี่ยนสถานะ: ${getStatus(oldId).name} → ${getStatus(id).name}`);
      notifyStatusChange(t, null, oldId, id);
      t.updatedAt = Date.now(); saveState(); renderAll();
    });
  });
  head.addEventListener("click", () => openTaskModal(t.id));
  wrap.appendChild(head);

  const list = document.createElement("div");
  list.className = "tp-cab-list";
  entry.cabs.forEach(({ sub, ed }) => list.appendChild(buildTpCabRow(t, sub, ed, today)));
  wrap.appendChild(list);
  return wrap;
}
function renderTodayPanel() {
  const body = document.getElementById("tpBody");
  if (!body) return;
  const summary = document.getElementById("tpSummary");
  const dateEl = document.getElementById("tpDate");
  const today = tpRefDay();   // reference day for this panel (real today + tpDayOffset)
  const pass = matchesFilter(currentFilter());
  const vDepts = activeViewDepts();

  // day stepper header (shared by both views)
  const dayWordEl = document.getElementById("tpDayWord");
  const dayBtn = document.getElementById("tpDayBtn");
  if (dayWordEl) dayWordEl.textContent = tpDayWord();
  if (dayBtn) dayBtn.classList.toggle("is-today", tpDayOffset === 0);
  if (dateEl) dateEl.textContent = formatDateTH(today);

  // ----- Department view: show the selected departments' stage deadlines -----
  if (vDepts.length) {
    renderTodayPanelDept(vDepts, today, pass);
    return;
  }

  // bucket at the CABINET level (each cabinet uses its own date, else project date)
  const overdueMap = new Map(); // taskId -> { task, cabs:[{sub,ed}] }
  const todayMap = new Map();
  let cabTotal = 0, cabDone = 0;

  const addTo = (map, t, sub, ed) => {
    if (!map.has(t.id)) map.set(t.id, { task: t, cabs: [] });
    map.get(t.id).cabs.push({ sub, ed });
  };

  const showOverdue = tpDayOffset === 0;   // overdue backlog only on "today"; other days show just that day
  state.tasks.filter(pass).forEach(t => {
    const subs = t.subtasks || [];
    const units = subs.length
      ? subs.map(s => ({ sub: s, ed: cabEffDate(t, s), done: subtaskDone(s) }))
      : [{ sub: null, ed: t.date, done: isStatusDone(getStatus(t.statusId)) }];
    units.forEach(u => {
      if (u.ed === today) { addTo(todayMap, t, u.sub, u.ed); cabTotal++; if (u.done) cabDone++; }
      else if (showOverdue && u.ed < today && !u.done) { addTo(overdueMap, t, u.sub, u.ed); cabTotal++; }
    });
  });

  const prRank = { urgent:4, high:3, medium:2, low:1, none:0 };
  const byEntry = (a,b) =>
    (prRank[b.task.priority]||0)-(prRank[a.task.priority]||0) || a.task.title.localeCompare(b.task.title,"th");
  const overdueGroups = [...overdueMap.values()].sort(byEntry);
  const todayGroups = [...todayMap.values()].sort(byEntry);
  // within each group sort cabs by date then name
  [...overdueGroups, ...todayGroups].forEach(g =>
    g.cabs.sort((a,b) => a.ed.localeCompare(b.ed) || (a.sub?.text||"").localeCompare(b.sub?.text||"", "th")));

  const pct = cabTotal ? Math.round(cabDone/cabTotal*100) : 0;
  summary.innerHTML = cabTotal ? `
    <div class="tp-sum-row"><span>ความคืบหน้า</span><span>${cabDone}/${cabTotal} ตู้</span></div>
    <div class="tp-progress-track"><div class="tp-progress-bar" style="width:${pct}%"></div></div>
  ` : "";

  body.innerHTML = "";
  if (overdueGroups.length === 0 && todayGroups.length === 0) {
    body.innerHTML = `<div class="tp-empty">🎉<br>ไม่มีตู้ที่ต้องเสร็จ${tpWhen()}</div>`;
    return;
  }
  if (overdueGroups.length) {
    const n = overdueGroups.reduce((s,g) => s + g.cabs.length, 0);
    body.appendChild(tpSectionLabel("เลยกำหนด", n, true));
    overdueGroups.forEach(g => body.appendChild(renderTpGroup(g, today)));
  }
  if (todayGroups.length) {
    const n = todayGroups.reduce((s,g) => s + g.cabs.length, 0);
    body.appendChild(tpSectionLabel(tpDueLabel(), n, false));
    todayGroups.forEach(g => body.appendChild(renderTpGroup(g, today)));
  }
}

/* Today panel in department view: this department's stage deadlines due today/overdue */
function renderTodayPanelDept(deptIds, today, pass) {
  const body = document.getElementById("tpBody");
  const summary = document.getElementById("tpSummary");
  // (the day stepper header — word + date — is set by renderTodayPanel before this runs)
  const depts = Array.isArray(deptIds) ? deptIds : [deptIds];
  const multi = depts.length > 1;
  const showOverdue = tpDayOffset === 0;   // overdue backlog only on "today"; other days show just that day
  const prRank = { urgent:4, high:3, medium:2, low:1, none:0 };
  const byEntry = (a,b) => (prRank[b.task.priority]||0)-(prRank[a.task.priority]||0) || a.task.title.localeCompare(b.task.title,"th");

  // a project group for one department: header + only the cabinets due this day for that dept
  function deptGroup(entry, deptId) {
    const t = entry.task, stg = entry.stg;
    const st = getStatus(t.statusId);
    const pr = getPriority(t.priority);
    const dn = (getDept(deptId) || {}).name || deptId;
    const usesChecklist = deptUsesChecklist(t, deptId);
    const deptDone = isDeptComplete(t, deptId);

    const wrap = document.createElement("div");
    wrap.className = "tp-group" + (deptDone ? " complete" : "");
    const headControl = usesChecklist
      ? (deptDone ? `<span class="dept-done-badge" title="แผนก ${escapeHtml(dn)} เสร็จแล้ว (ติ๊ก checklist ครบทุกตู้)">✓</span>` : "")
      : `<input type="checkbox" class="dept-done-cb" ${stg.done?"checked":""} title="ติ๊กเมื่อแผนก ${escapeHtml(dn)} ทำเสร็จ" />`;
    const head = document.createElement("div");
    head.className = "tp-group-head";
    const fchips = stageFieldChips(t, deptId).map(f =>
      `<span class="tp-field" title="${escapeHtml(f.name)}: ${escapeHtml(f.label)}">${escapeHtml(f.label)}</span>`).join("");
    head.innerHTML = `
      ${headControl}
      <button type="button" class="subtask-dot" style="--st-color:${st.color}" title="สถานะงาน (รวม): ${escapeHtml(st.name)}"></button>
      <span class="tp-group-title">${pr.id!=="none"?priFlag(pr)+" ":""}${escapeHtml(t.title)}</span>
      ${alertPin(t)}
      ${fchips}
    `;
    const cb = head.querySelector(".dept-done-cb");
    if (cb) {
      cb.addEventListener("click", (e) => e.stopPropagation());
      cb.addEventListener("change", () => {
        stg.done = cb.checked;
        logActivity(t, cb.checked ? `✓ แผนก ${dn} เสร็จ` : `ยกเลิกเสร็จ แผนก ${dn}`);
        if (cb.checked && taskRelevantToMe(t)) pushNotify("done", "✅ แผนกเสร็จ", `${t.title} · ${dn}`, "dd-" + t.id + deptId);
        t.updatedAt = Date.now(); saveState(); renderAll();
      });
    }
    const headDot = head.querySelector(".subtask-dot");
    headDot.addEventListener("click", (e) => {
      e.stopPropagation();
      openStatusPopover(headDot, t.statusId, (id) => {
        const oldId = t.statusId; t.statusId = id;
        logActivity(t, `เปลี่ยนสถานะ: ${getStatus(oldId).name} → ${getStatus(id).name}`);
        notifyStatusChange(t, null, oldId, id);
        t.updatedAt = Date.now(); saveState(); renderAll();
      });
    });
    head.addEventListener("click", () => openTaskModal(t.id, { focusDept: deptId }));
    wrap.appendChild(head);

    const list = document.createElement("div");
    list.className = "tp-cab-list";
    entry.cabs.forEach(({ sub, ed }) => {
      if (sub) list.appendChild(buildTpCabRow(t, sub, ed, today, deptId));
      else { const hint = document.createElement("div"); hint.className = "tp-cab-empty"; hint.textContent = "ยังไม่มีตู้ในโปรเจคนี้"; list.appendChild(hint); }
    });
    wrap.appendChild(list);
    return wrap;
  }

  // bucket cabinets for ONE department by its per-cabinet due date, grouped by project
  function computeDept(deptId) {
    const overdueMap = new Map(), todayMap = new Map();
    let cabTotal = 0, cabDone = 0;
    const addTo = (map, t, stg, sub, ed) => {
      if (!map.has(t.id)) map.set(t.id, { task: t, stg, cabs: [] });
      map.get(t.id).cabs.push({ sub, ed });
    };
    state.tasks.filter(pass).forEach(t => {
      const stg = taskStage(t, deptId);
      if (!stg) return;
      const subs = t.subtasks || [];
      const units = subs.length
        ? subs.map(s => ({ sub: s, ed: cabinetDeptDue(t, s, deptId), done: cabDeptDone(t, s, deptId) }))
        : [{ sub: null, ed: stg.due || null, done: isDeptComplete(t, deptId) }];
      units.forEach(u => {
        if (!u.ed) return;
        if (u.ed === today) { addTo(todayMap, t, stg, u.sub, u.ed); cabTotal++; if (u.done) cabDone++; }
        else if (showOverdue && u.ed < today && !u.done) { addTo(overdueMap, t, stg, u.sub, u.ed); cabTotal++; }
      });
    });
    const overdueGroups = [...overdueMap.values()].sort(byEntry);
    const todayGroups = [...todayMap.values()].sort(byEntry);
    [...overdueGroups, ...todayGroups].forEach(g =>
      g.cabs.sort((a,b) => (a.ed||"").localeCompare(b.ed||"") || (a.sub?.text||"").localeCompare(b.sub?.text||"", "th")));
    return { overdueGroups, todayGroups, cabTotal, cabDone };
  }

  body.innerHTML = "";
  let totCab = 0, totDone = 0, anyShown = false;
  depts.forEach(deptId => {
    const r = computeDept(deptId);
    totCab += r.cabTotal; totDone += r.cabDone;
    if (!r.overdueGroups.length && !r.todayGroups.length) return;
    anyShown = true;
    if (multi) {   // dept heading per section when several departments are shown
      const d = getDept(deptId) || {};
      const h = document.createElement("div");
      h.className = "tp-dept-head";
      h.innerHTML = `<span class="tp-dept-head-dot" style="background:${d.color || '#888'}"></span>${escapeHtml(d.name || deptId)}`;
      body.appendChild(h);
    }
    if (r.overdueGroups.length) {
      body.appendChild(tpSectionLabel("เลยกำหนด", r.overdueGroups.reduce((s,g)=>s+g.cabs.length,0), true));
      r.overdueGroups.forEach(g => body.appendChild(deptGroup(g, deptId)));
    }
    if (r.todayGroups.length) {
      body.appendChild(tpSectionLabel(tpDueLabel(), r.todayGroups.reduce((s,g)=>s+g.cabs.length,0), false));
      r.todayGroups.forEach(g => body.appendChild(deptGroup(g, deptId)));
    }
  });

  const pct = totCab ? Math.round(totDone/totCab*100) : 0;
  summary.innerHTML = totCab ? `
    <div class="tp-sum-row"><span>${multi?"แผนกที่เลือก":"แผนกนี้"}เสร็จแล้ว (${tpWhen()})</span><span>${totDone}/${totCab} ตู้</span></div>
    <div class="tp-progress-track"><div class="tp-progress-bar" style="width:${pct}%"></div></div>
  ` : "";

  if (!anyShown) {
    body.innerHTML = `<div class="tp-empty">🎉<br>ไม่มีงาน${multi?"ของแผนกที่เลือก":"ของแผนกนี้"}<br>ที่ต้องเสร็จ${tpWhen()}</div>`;
  }
}

/* ---------- Settings modal (single entry point for all settings) ----------
   Sections are modular — add a new nav button + build<X>Panel() to extend. */
function openSettingsModal(initialTab = "statuses") {
  const overlay = document.createElement("div");
  overlay.className = "overlay";
  overlay.innerHTML = `
    <div class="modal settings-modal" role="dialog" aria-modal="true">
      <div class="modal-head">
        <h3>⚙ ตั้งค่า</h3>
        <button class="btn btn-ghost" data-act="close" title="ปิด">✕</button>
      </div>
      <div class="settings-layout">
        <nav class="settings-nav">
          <button class="settings-nav-item" data-tab="user">👤 ผู้ใช้</button>
          <button class="settings-nav-item" data-tab="statuses">🏷️ สถานะงาน</button>
          <button class="settings-nav-item" data-tab="departments">🏢 แผนก</button>
          <button class="settings-nav-item" data-tab="fields">🧩 ฟิลด์เพิ่มเติม</button>
          <button class="settings-nav-item" data-tab="checklist">🧾 เช็คลิสต์ตู้</button>
          <button class="settings-nav-item" data-tab="display">🖥️ การแสดงผล</button>
          <button class="settings-nav-item" data-tab="notify">🔔 การแจ้งเตือน</button>
          <button class="settings-nav-item" data-tab="data">💾 ข้อมูล</button>
        </nav>
        <div class="settings-content" data-content></div>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);

  const content = overlay.querySelector('[data-content]');
  const navBtns = [...overlay.querySelectorAll('.settings-nav-item')];
  const PANELS = { user: buildUserPanel, statuses: buildStatusesPanel, departments: buildDeptsPanel, fields: buildFieldsPanel, checklist: buildChecklistTemplatePanel, display: buildDisplayPanel, notify: buildNotifyPanel, data: buildDataPanel };

  function showTab(tab) {
    navBtns.forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    content.innerHTML = "";
    (PANELS[tab] || PANELS.statuses)(content);
  }
  navBtns.forEach(b => b.addEventListener('click', () => showTab(b.dataset.tab)));

  function close(){ overlay.remove(); }
  overlay.addEventListener("click", (e) => { if (e.target === overlay) close(); });
  overlay.querySelectorAll('[data-act="close"]').forEach(b => b.addEventListener("click", close));

  showTab(initialTab);
}

/* Settings → สถานะงาน (live editing, applies immediately) */
function buildStatusesPanel(container) {
  const sec = document.createElement("div");
  sec.className = "settings-section";
  sec.innerHTML = `
    <h4 class="settings-h">สถานะงาน</h4>
    <p class="settings-desc">กำหนดสถานะ สี และลำดับ — ใช้ร่วมกันทั้งงาน (โปรเจค) และตู้ (subtask) ติ๊ก “เสร็จ” เพื่อให้สถานะนั้นถือว่าเสร็จ (ขีดทับ + นับความคืบหน้า)</p>
    <div data-list></div>
    <button class="btn btn-sm" data-act="add">+ เพิ่มสถานะ</button>
  `;
  container.appendChild(sec);
  const listEl = sec.querySelector('[data-list]');

  function renderRows() {
    listEl.innerHTML = "";
    state.statuses.forEach((s, i) => {
      const row = document.createElement("div");
      row.className = "status-edit-row";
      row.innerHTML = `
        <label class="color-swatch" style="background:${s.color}">
          <input type="color" value="${s.color}" />
        </label>
        <input type="text" value="${escapeHtml(s.name)}" placeholder="ชื่อสถานะ" />
        <label class="done-toggle" title="ถือเป็นเสร็จสิ้น — งาน/ตู้ที่อยู่ในสถานะนี้จะถูกขีดทับและนับเป็น 'เสร็จ'">
          <input type="checkbox" ${s.isDone?"checked":""} />เสร็จ
        </label>
        <button class="btn btn-ghost btn-sm" data-act="up" title="ขึ้น">↑</button>
        <button class="btn btn-ghost btn-sm" data-act="down" title="ลง">↓</button>
        <button class="btn btn-ghost btn-sm btn-danger" data-act="del" title="ลบ">✕</button>
      `;
      const [swatch, nameInput, doneLbl, upBtn, downBtn, delBtn] = row.children;
      const colorInput = swatch.querySelector("input");
      const doneCb = doneLbl.querySelector("input");
      // live updates: change state directly + save + refresh background (modal stays open, focus kept)
      colorInput.addEventListener("input", () => {
        s.color = colorInput.value; swatch.style.background = colorInput.value;
        saveState(); renderAll();
      });
      nameInput.addEventListener("input", () => { s.name = nameInput.value; saveState(); renderAll(); });
      doneCb.addEventListener("change", () => { s.isDone = doneCb.checked; saveState(); renderAll(); });
      upBtn.addEventListener("click", () => {
        if (i>0) { [state.statuses[i-1], state.statuses[i]] = [state.statuses[i], state.statuses[i-1]]; saveState(); renderRows(); renderAll(); }
      });
      downBtn.addEventListener("click", () => {
        if (i<state.statuses.length-1) { [state.statuses[i+1], state.statuses[i]] = [state.statuses[i], state.statuses[i+1]]; saveState(); renderRows(); renderAll(); }
      });
      delBtn.addEventListener("click", async () => {
        if (state.statuses.length <= 1) { alert("ต้องมีอย่างน้อย 1 สถานะ"); return; }
        const ok = await confirmDialog({
          title: `ลบสถานะ “${s.name}”?`,
          message: "งาน/ตู้ที่ใช้สถานะนี้จะถูกย้ายไปสถานะแรกในรายการ",
          confirmText: "ลบสถานะ",
        });
        if (!ok) return;
        state.statuses.splice(i, 1);
        const fallback = state.statuses[0].id;
        const validIds = new Set(state.statuses.map(x => x.id));
        state.tasks.forEach(t => {
          if (!validIds.has(t.statusId)) t.statusId = fallback;
          (t.subtasks || []).forEach(st => { if (!validIds.has(st.statusId)) st.statusId = fallback; });
        });
        saveState(); renderRows(); renderAll();
      });
      listEl.appendChild(row);
    });
  }
  renderRows();
  sec.querySelector('[data-act="add"]').addEventListener("click", () => {
    state.statuses.push({ id: uid("s"), name: "สถานะใหม่", color: "#7b68ee", isDone: false });
    saveState(); renderRows(); renderAll();
  });
}

/* Settings → แผนก (live editing) */
function buildDeptsPanel(container) {
  if (!Array.isArray(state.departments)) state.departments = [];
  const sec = document.createElement("div");
  sec.className = "settings-section";
  sec.innerHTML = `
    <h4 class="settings-h">แผนก (Department / ด่านส่งต่อ)</h4>
    <p class="settings-desc">กำหนดแผนกที่งานต้องไหลผ่าน เรียงตามลำดับ workflow — แต่ละงานจะตั้งวันครบกำหนดของแต่ละแผนกได้ในป๊อบอัพงาน และสลับดูตามแผนกได้ที่แถบซ้าย</p>
    <div data-list></div>
    <button class="btn btn-sm" data-act="add">+ เพิ่มแผนก</button>
  `;
  container.appendChild(sec);
  const listEl = sec.querySelector('[data-list]');

  // second section: which departments are pre-added as stages on every new task
  const defSec = document.createElement("div");
  defSec.className = "settings-section";
  defSec.innerHTML = `
    <h4 class="settings-h">ด่านเริ่มต้นสำหรับงานใหม่</h4>
    <p class="settings-desc">เลือกแผนกที่จะถูกเพิ่มเป็น “กำหนดส่งต่อแผนก” ให้อัตโนมัติทุกครั้งที่สร้างงานใหม่ (เรียงตามลำดับ workflow ด้านบน) — ส่วนวันครบกำหนดของแต่ละด่านยังตั้งเองในป๊อบอัพงาน</p>
    <div class="default-stage-list" data-default-list></div>
  `;
  container.appendChild(defSec);
  const defListEl = defSec.querySelector('[data-default-list]');

  // third section: date-limit rule — block chosen departments from being scheduled past an anchor dept
  const limSec = document.createElement("div");
  limSec.className = "settings-section";
  limSec.innerHTML = `
    <h4 class="settings-h">จำกัดวันไม่ให้เกินแผนกอ้างอิง</h4>
    <p class="settings-desc">บล็อกไม่ให้แผนกที่เลือก ตั้งวันครบกำหนด “เกินกว่า” วันของแผนกอ้างอิง (เช่น ทุกแผนกต้องไม่เกิน QC — ยกเว้นจัดส่ง) มีผลทั้งในป๊อบอัพงานและการลากบนปฏิทิน</p>
    <label class="settings-toggle-row">
      <input type="checkbox" data-lim-enabled />
      <span class="settings-toggle-text"><span class="settings-toggle-title">เปิดใช้งานการจำกัด</span></span>
    </label>
    <div class="field"><label>แผนกอ้างอิง (เพดานวัน)</label><select data-lim-anchor></select></div>
    <div class="field"><label>แผนกที่ถูกบล็อก (ห้ามตั้งวันเกินแผนกอ้างอิง)</label><div class="default-stage-list" data-lim-list></div></div>
  `;
  container.appendChild(limSec);

  function renderDateLimit() {
    const dl = state.settings.dateLimit || (state.settings.dateLimit = { enabled: true, anchorDept: null, blockedDepts: [] });
    if (!Array.isArray(dl.blockedDepts)) dl.blockedDepts = [];
    const enCb = limSec.querySelector('[data-lim-enabled]');
    const anchorSel = limSec.querySelector('[data-lim-anchor]');
    const listEl = limSec.querySelector('[data-lim-list]');
    enCb.checked = !!dl.enabled;
    anchorSel.innerHTML = state.departments.map(d => `<option value="${d.id}">${escapeHtml(d.name)}</option>`).join("");
    if (dl.anchorDept) anchorSel.value = dl.anchorDept;
    const blocked = new Set(dl.blockedDepts);
    const others = state.departments.filter(d => d.id !== dl.anchorDept);
    listEl.innerHTML = "";
    if (others.length === 0) { listEl.innerHTML = `<div class="muted" style="font-size:12px">ยังไม่มีแผนกอื่น</div>`; return; }
    others.forEach(d => {
      const row = document.createElement("label");
      row.className = "default-stage-row";
      row.innerHTML = `
        <input type="checkbox" ${blocked.has(d.id) ? "checked" : ""} />
        <span class="stage-dept-dot" style="background:${d.color}"></span>
        <span class="default-stage-name">${escapeHtml(d.name)}</span>
      `;
      row.querySelector("input").addEventListener("change", (e) => {
        if (e.target.checked) { if (!dl.blockedDepts.includes(d.id)) dl.blockedDepts.push(d.id); }
        else dl.blockedDepts = dl.blockedDepts.filter(id => id !== d.id);
        saveState();
      });
      listEl.appendChild(row);
    });
  }
  limSec.querySelector('[data-lim-enabled]').addEventListener("change", (e) => {
    state.settings.dateLimit.enabled = e.target.checked; saveState();
  });
  limSec.querySelector('[data-lim-anchor]').addEventListener("change", (e) => {
    const dl = state.settings.dateLimit;
    dl.anchorDept = e.target.value;
    dl.blockedDepts = (dl.blockedDepts || []).filter(id => id !== dl.anchorDept); // anchor can't block itself
    saveState(); renderDateLimit();
  });

  function renderDefaults() {
    if (!Array.isArray(state.settings.defaultStages)) state.settings.defaultStages = [];
    defListEl.innerHTML = "";
    if (state.departments.length === 0) {
      defListEl.innerHTML = `<div class="muted" style="font-size:12px">ยังไม่มีแผนก</div>`;
      return;
    }
    const chosen = new Set(state.settings.defaultStages);
    state.departments.forEach(dpt => {
      const row = document.createElement("label");
      row.className = "default-stage-row";
      row.innerHTML = `
        <input type="checkbox" ${chosen.has(dpt.id) ? "checked" : ""} />
        <span class="stage-dept-dot" style="background:${dpt.color}"></span>
        <span class="default-stage-name">${escapeHtml(dpt.name)}</span>
      `;
      const cb = row.querySelector("input");
      cb.addEventListener("change", () => {
        if (cb.checked) { if (!state.settings.defaultStages.includes(dpt.id)) state.settings.defaultStages.push(dpt.id); }
        else state.settings.defaultStages = state.settings.defaultStages.filter(id => id !== dpt.id);
        saveState();
      });
      defListEl.appendChild(row);
    });
    renderDateLimit();
  }

  function renderRows() {
    listEl.innerHTML = "";
    state.departments.forEach((dpt, i) => {
      const row = document.createElement("div");
      row.className = "status-edit-row";
      row.innerHTML = `
        <label class="color-swatch" style="background:${dpt.color}">
          <input type="color" value="${dpt.color}" />
        </label>
        <input type="text" value="${escapeHtml(dpt.name)}" placeholder="ชื่อแผนก" />
        <button class="btn btn-ghost btn-sm" data-act="up" title="ขึ้น">↑</button>
        <button class="btn btn-ghost btn-sm" data-act="down" title="ลง">↓</button>
        <button class="btn btn-ghost btn-sm btn-danger" data-act="del" title="ลบ">✕</button>
      `;
      const [swatch, nameInput, upBtn, downBtn, delBtn] = row.children;
      const colorInput = swatch.querySelector("input");
      colorInput.addEventListener("input", () => { dpt.color = colorInput.value; swatch.style.background = colorInput.value; saveState(); renderDefaults(); renderAll(); });
      nameInput.addEventListener("input", () => { dpt.name = nameInput.value; saveState(); renderDefaults(); renderAll(); });
      upBtn.addEventListener("click", () => { if (i>0){ [state.departments[i-1],state.departments[i]]=[state.departments[i],state.departments[i-1]]; saveState(); renderRows(); renderDefaults(); renderAll(); } });
      downBtn.addEventListener("click", () => { if (i<state.departments.length-1){ [state.departments[i+1],state.departments[i]]=[state.departments[i],state.departments[i+1]]; saveState(); renderRows(); renderDefaults(); renderAll(); } });
      delBtn.addEventListener("click", async () => {
        const ok = await confirmDialog({
          title: `ลบแผนก “${dpt.name}”?`,
          message: "ด่านของแผนกนี้ในทุกงานจะถูกลบด้วย",
          confirmText: "ลบแผนก",
        });
        if (!ok) return;
        const removedId = dpt.id;
        state.departments.splice(i, 1);
        state.tasks.forEach(t => { if (Array.isArray(t.deptStages)) t.deptStages = t.deptStages.filter(s => s.deptId !== removedId); });
        if (Array.isArray(state.settings.defaultStages)) state.settings.defaultStages = state.settings.defaultStages.filter(id => id !== removedId);
        const dl = state.settings.dateLimit;
        if (dl) {
          dl.blockedDepts = (dl.blockedDepts || []).filter(id => id !== removedId);
          if (dl.anchorDept === removedId) dl.anchorDept = state.departments.find(d => d.id === "d_qc") ? "d_qc" : (state.departments[0] && state.departments[0].id) || null;
        }
        if (Array.isArray(state.settings.viewDepts)) state.settings.viewDepts = state.settings.viewDepts.filter(id => id !== removedId);
        saveState(); renderRows(); renderDefaults(); renderAll();
      });
      listEl.appendChild(row);
    });
  }
  renderRows();
  renderDefaults();
  sec.querySelector('[data-act="add"]').addEventListener("click", () => {
    state.departments.push({ id: uid("d"), name: "แผนกใหม่", color: "#7b68ee" });
    saveState(); renderRows(); renderDefaults(); renderAll();
  });
}

/* Settings → 🧩 ฟิลด์เพิ่มเติม : custom dropdown fields per department (field → groups → options).
   The value is chosen per task on its department stage (stg.fields[fieldId]) in the task popup. */
function buildFieldsPanel(container) {
  if (!Array.isArray(state.departments)) state.departments = [];
  const sec = document.createElement("div");
  sec.className = "settings-section";
  sec.innerHTML = `
    <h4 class="settings-h">ฟิลด์ dropdown กำหนดเอง (ต่อแผนก)</h4>
    <p class="settings-desc">สร้างช่องเลือกเพิ่มเติมให้แต่ละแผนก เช่น แผนก “ส่งมอบ” มีฟิลด์ “รถขนส่ง” — ตัวเลือกจัดเป็นกลุ่มได้ (เช่น รถบริษัท / รถเช่า) ค่าที่เลือกตั้งในป๊อบอัพงาน (ต่อแผนก ทั้งโปรเจค) ติ๊ก “แสดงบนปฏิทิน” เพื่อให้โชว์บน chip และแถบ “ต้องเสร็จ”</p>
    <div class="field"><label>เลือกแผนก</label><select data-dept></select></div>
    <div data-fields></div>
    <button class="btn btn-sm" data-add-field>+ เพิ่มฟิลด์</button>
  `;
  container.appendChild(sec);
  if (state.departments.length === 0) {
    sec.querySelector('[data-fields]').innerHTML = `<div class="cf-empty">ยังไม่มีแผนก — เพิ่มได้ที่ ⚙ ตั้งค่า › แผนก</div>`;
    sec.querySelector('[data-add-field]').style.display = "none";
    sec.querySelector('[data-dept]').style.display = "none";
    return;
  }
  const deptSel = sec.querySelector('[data-dept]');
  const fieldsEl = sec.querySelector('[data-fields]');
  deptSel.innerHTML = state.departments.map(d => `<option value="${d.id}">${escapeHtml(d.name)}</option>`).join("");
  let curDeptId = state.departments[0].id;
  deptSel.value = curDeptId;

  const curDept = () => getDept(curDeptId) || state.departments[0];
  const ensureFields = (d) => { if (!Array.isArray(d.fields)) d.fields = []; return d.fields; };

  function renderFields() {
    const d = curDept();
    const fields = ensureFields(d);
    fieldsEl.innerHTML = "";
    if (fields.length === 0) { fieldsEl.innerHTML = `<div class="cf-empty">ยังไม่มีฟิลด์ในแผนกนี้ — กด “+ เพิ่มฟิลด์”</div>`; return; }
    fields.forEach((f, fi) => {
      if (!Array.isArray(f.groups)) f.groups = [];
      const fieldBox = document.createElement("div");
      fieldBox.className = "cf-field";
      fieldBox.innerHTML = `
        <div class="cf-field-head">
          <input type="text" class="cf-fname" value="${escapeHtml(f.name || "")}" placeholder="ชื่อฟิลด์ เช่น รถขนส่ง" />
          <label class="cf-showchip" title="แสดงค่าที่เลือกบน chip ปฏิทิน และแถบ ‘ต้องเสร็จ’"><input type="checkbox" ${f.showOnChip ? "checked" : ""} /> แสดงบนปฏิทิน</label>
          <button class="btn btn-ghost btn-sm btn-danger" data-del-field title="ลบฟิลด์">✕</button>
        </div>
        <div class="cf-groups" data-groups></div>
        <button class="btn btn-sm" data-add-group>+ เพิ่มกลุ่ม</button>
      `;
      const fname = fieldBox.querySelector(".cf-fname");
      fname.addEventListener("input", () => { f.name = fname.value; saveState(); renderAll(); });
      fieldBox.querySelector(".cf-showchip input").addEventListener("change", (e) => { f.showOnChip = e.target.checked; saveState(); renderAll(); });
      fieldBox.querySelector("[data-del-field]").addEventListener("click", async () => {

        fields.splice(fi, 1);

            <button class="btn btn-sm" data-add-opt>+ เพิ่มตัวเลือก</button>
          `;
          const gname = groupBox.querySelector(".cf-gname");
          gname.addEventListener("input", () => { g.name = gname.value; saveState(); renderAll(); });
          groupBox.querySelector("[data-del-group]").addEventListener("click", () => { f.groups.splice(gi, 1); saveState(); renderGroups(); renderAll(); });
          const optsEl = groupBox.querySelector("[data-opts]");

          function renderOpts() {
            optsEl.innerHTML = "";
            g.options.forEach((o, oi) => {
              const optRow = document.createElement("div");
              optRow.className = "cf-opt";
              optRow.innerHTML = `
                <input type="text" class="cf-oname" value="${escapeHtml(o.label || "")}" placeholder="ตัวเลือก เช่น 1กข-1234" />
                <button class="btn btn-ghost btn-sm btn-danger" data-del-opt title="ลบตัวเลือก">✕</button>
              `;
              const oname = optRow.querySelector(".cf-oname");
              oname.addEventListener("input", () => { o.label = oname.value; saveState(); renderAll(); });
              optRow.querySelector("[data-del-opt]").addEventListener("click", () => { g.options.splice(oi, 1); saveState(); renderOpts(); renderAll(); });
              optsEl.appendChild(optRow);
            });
          }
          renderOpts();
          groupBox.querySelector("[data-add-opt]").addEventListener("click", () => {
            g.options.push({ id: uid("opt"), label: "" }); saveState(); renderOpts();
            optsEl.lastChild?.querySelector("input")?.focus();

        });

/* ---------- Import / Export ---------- */
function exportJson() {
  // full backup = every board (whole root)
  const blob = new Blob([JSON.stringify(root, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `qc-calendar-backup-${todayIso()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}
function importJson(file) {
  const r = new FileReader();
  r.onload = async () => {
    let data, isRoot, isFlat;
    try {
      data = JSON.parse(r.result);
      isRoot = data && data.boards && typeof data.boards === "object";
      isFlat = data && data.statuses && data.tasks;
      if (!isRoot && !isFlat) throw new Error("invalid");
    } catch (e) {
      alert("ไฟล์ไม่ถูกต้อง");
      return;
    }
    const ok = await confirmDialog({
      title: "แทนที่ข้อมูล?",
      message: isRoot
        ? "จะแทนที่ข้อมูลของ ‘ทุกปฏิทิน’ ด้วยไฟล์นี้ — ย้อนกลับไม่ได้"
        : `จะแทนที่ข้อมูลของปฏิทิน “${(root.boardMeta.find(b=>b.id===root.activeBoard)||{}).name||''}” ที่กำลังดูด้วยไฟล์นี้ — ย้อนกลับไม่ได้`,
      confirmText: "แทนที่",
    });
    if (!ok) return;
    if (isRoot) {
      if (!Array.isArray(data.boardMeta) || !data.boardMeta.length) data.boardMeta = DEFAULT_BOARDS.map(b => ({ ...b }));
      data.boardMeta.forEach(b => { if (!data.boards[b.id]) data.boards[b.id] = defaultState(); });
      Object.values(data.boards).forEach(ws => migrateState(ws));
      if (!data.boards[data.activeBoard]) data.activeBoard = data.boardMeta[0].id;
      root = data;
    } else {
      migrateState(data);
      root.boards[root.activeBoard] = data;   // old single-board file → import into current board
    }
    state = root.boards[root.activeBoard];
    saveState();
    renderAll();
  };
  r.readAsText(file);
}
