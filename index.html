// Multiple independent calendars ("boards") in one app — each board is a full workspace
// (own statuses, departments, checklist templates, settings, tasks). Default: โรงงาน + ออกไซต์.
const DEFAULT_BOARDS = [{ id: "factory", name: "โรงงาน" }, { id: "onsite", name: "ออกไซต์" }];
function defaultRoot() {
  return {
    activeBoard: "factory",
    boardMeta: DEFAULT_BOARDS.map(b => ({ ...b })),
    boards: { factory: defaultState(), onsite: defaultState() },
  };
}

let root = loadRoot();
let state = root.boards[root.activeBoard];   // active workspace (all render code reads `state`)
let view = { year: new Date().getFullYear(), month: new Date().getMonth() }; // 0-based month
let tpDayOffset = 0; // "ต้องเสร็จวันนี้" panel: 0 = today, +1 = tomorrow, -1 = yesterday ...
let viewMode = "calendar"; // main view: "calendar" (month grid) | "gantt" (timeline) | "dashboard"
let dashDept = null;       // dashboard department filter (null = ทุกแผนก)
let dragTaskId = null;
let dragSub = null; // { taskId, subId } when dragging a cabinet chip
let dragStage = null; // { taskId, deptId } when dragging a department-stage chip
let dragDeptCab = null; // { taskId, subId, deptId } when dragging a per-cabinet department chip

// stable color per project name (for cabinet chip marker)
function projHashColor(name) {
  if (!name) return "#98a2b3";
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
  return `hsl(${h % 360}, 55%, 52%)`;
}

function loadRoot() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultRoot();
    const parsed = JSON.parse(raw);
    // new multi-board format
    if (parsed.boards && typeof parsed.boards === "object") {
      if (!Array.isArray(parsed.boardMeta) || !parsed.boardMeta.length) parsed.boardMeta = DEFAULT_BOARDS.map(b => ({ ...b }));
      parsed.boardMeta.forEach(b => { if (!parsed.boards[b.id]) parsed.boards[b.id] = defaultState(); });
      Object.values(parsed.boards).forEach(ws => migrateState(ws));
      if (!parsed.boards[parsed.activeBoard]) parsed.activeBoard = parsed.boardMeta[0].id;
      return parsed;
    }
    // old single-workspace format → wrap into the "factory" board
    if (parsed.statuses && parsed.tasks) {
      migrateState(parsed);
      const r = defaultRoot();
      r.boards.factory = parsed;
      return r;
    }
    return defaultRoot();
  } catch (e) {
    return defaultRoot();
  }
}
// switch the active calendar (board) — repoints `state` and re-renders everything
function setBoard(id) {
  if (!root.boards[id] || id === root.activeBoard) return;
  document.querySelectorAll(".overlay, .checklist-popover, #appToast").forEach(n => n.remove());
  root.activeBoard = id;
  state = root.boards[id];
  saveState();
  renderAll();
  checkAlerts();   // pop any unacknowledged alerts for the board we just switched to
}

/* Migrate older saved data:
   - ensure each status has isDone flag (last status defaults to true if none flagged)
   - convert subtasks { done: bool } -> { statusId } using a "done" status / first status */
function migrateState(s) {
  if (!Array.isArray(s.statuses) || s.statuses.length === 0) return;
  let anyDone = s.statuses.some(st => st.isDone);
  s.statuses.forEach((st, i) => {
    if (typeof st.isDone !== "boolean") st.isDone = false;
  });
  if (!anyDone) {
    // mark the last status as done by default
    s.statuses[s.statuses.length - 1].isDone = true;
  }
  const doneStatus = s.statuses.find(st => st.isDone) || s.statuses[s.statuses.length - 1];
  const firstStatus = s.statuses[0];
  // departments + view setting (added later)
  if (!Array.isArray(s.departments)) s.departments = defaultState().departments;
  if (!s.settings) s.settings = {};
  // view departments (multi-select). migrate old single viewDept ("all"|id) → array
  if (!Array.isArray(s.settings.viewDepts)) {
    const old = s.settings.viewDept;
    s.settings.viewDepts = (old && old !== "all") ? [old] : [];
  }
  delete s.settings.viewDept;
  if (typeof s.settings.currentUser !== "string") s.settings.currentUser = "";
  if (typeof s.settings.myDept !== "string") s.settings.myDept = "";
  // default department stages for new tasks; seed with all current departments, drop any removed ones
  if (!Array.isArray(s.settings.defaultStages)) s.settings.defaultStages = s.departments.map(d => d.id);
  else { const validDeptIds = new Set(s.departments.map(d => d.id)); s.settings.defaultStages = s.settings.defaultStages.filter(id => validDeptIds.has(id)); }
  if (typeof s.settings.deptCalByCabinet !== "boolean") s.settings.deptCalByCabinet = false;
  // browser notification preferences (which events fire a desktop notification)
  if (!s.settings.notify || typeof s.settings.notify !== "object") {
    s.settings.notify = { enabled: true, onlyMyDept: true, alert: true, status: true, comment: true, done: true };
  } else {
    const n = s.settings.notify;
    ["enabled", "onlyMyDept", "alert", "status", "comment", "done"].forEach(k => { if (typeof n[k] !== "boolean") n[k] = true; });
  }
  // date-limit rule (block depts from being scheduled past an anchor dept)
  {
    const valid = new Set(s.departments.map(d => d.id));
    if (!s.settings.dateLimit || typeof s.settings.dateLimit !== "object") {
      const anchor = valid.has("d_qc") ? "d_qc" : ((s.departments[Math.min(2, s.departments.length - 1)] || {}).id || null);
      const ai = s.departments.findIndex(d => d.id === anchor);
      s.settings.dateLimit = { enabled: true, anchorDept: anchor, blockedDepts: ai > 0 ? s.departments.slice(0, ai).map(d => d.id) : [] };
    } else {
      const dl = s.settings.dateLimit;
      if (typeof dl.enabled !== "boolean") dl.enabled = true;
      if (!valid.has(dl.anchorDept)) dl.anchorDept = valid.has("d_qc") ? "d_qc" : ((s.departments[0] || {}).id || null);
      dl.blockedDepts = Array.isArray(dl.blockedDepts) ? dl.blockedDepts.filter(id => valid.has(id) && id !== dl.anchorDept) : [];
    }
  }
  // Option A: each department owns a checklist template
  s.departments.forEach(d => { if (!Array.isArray(d.checklist)) d.checklist = []; });
  // custom dropdown fields per department: [{ id, name, showOnChip, groups:[{ id, name, options:[{id,label}] }] }]
  s.departments.forEach(d => {
    if (!Array.isArray(d.fields)) d.fields = [];
    d.fields.forEach(f => {
      if (typeof f.showOnChip !== "boolean") f.showOnChip = false;
      if (!Array.isArray(f.groups)) f.groups = [];
      f.groups.forEach(g => { if (!Array.isArray(g.options)) g.options = []; });
    });
  });
  const qcDept = s.departments.find(d => d.id === "d_qc") || s.departments[0];
  if (qcDept && qcDept.checklist.length === 0) {
    // seed QC's checklist from the old universal template (or default)
    qcDept.checklist = (Array.isArray(s.checklistTemplate) && s.checklistTemplate.length)
      ? s.checklistTemplate.slice() : [...DEFAULT_CHECKLIST];
  }
  delete s.checklistTemplate;
  const fallbackDeptId = qcDept ? qcDept.id : (s.departments[0] && s.departments[0].id);
  (s.tasks || []).forEach(t => {
    if (!Array.isArray(t.subtasks)) t.subtasks = [];
    if (!Array.isArray(t.comments)) t.comments = []; // activity feed [{ id, author, text, at }]
    if (!Array.isArray(t.deptStages)) t.deptStages = []; // [{ deptId, due, done }]
    t.deptStages.forEach(stg => {
      if (typeof stg.done !== "boolean") {
        const st = (s.statuses || []).find(x => x.id === stg.statusId);
        stg.done = !!(st && st.isDone);
      }
      delete stg.statusId;
      // chosen custom-field values for this stage: { fieldId: optionId }
      if (!stg.fields || typeof stg.fields !== "object") stg.fields = {};
    });
    t.subtasks.forEach(st => {
      if (!st.statusId) {
        st.statusId = st.done ? doneStatus.id : firstStatus.id;
      }
      delete st.done;
      // per-cabinet, per-department due dates { deptId: ISO } (override the dept's project due)
      if (!st.deptDates || typeof st.deptDates !== "object") st.deptDates = {};
      // 3rd level: ensure each cabinet has a checklist; tag legacy items with a department
      if (!Array.isArray(st.checklist)) st.checklist = makeCabinetChecklist(s.departments);
      else st.checklist.forEach(item => { if (!item.deptId) item.deptId = fallbackDeptId; });
    });
  });
}
function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(root));
  } catch (e) {
    // most likely QuotaExceededError — attached photos (base64) can fill localStorage (~5MB)
    console.warn("saveState failed", e);
    try { toast("⚠️ พื้นที่จัดเก็บเต็ม (รูปแนบอาจมากไป) — บันทึกไม่สำเร็จ · ลองลบรูปเก่า หรือ Export ข้อมูลออก"); } catch (_) {}
  }
}
function uid(prefix = "id") {
  return prefix + "_" + Math.random().toString(36).slice(2, 9) + Date.now().toString(36).slice(-4);
}
function isoDate(d) {
  if (typeof d === "string") return d.slice(0, 10);
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
function fromIso(s) {
  const [y,m,d] = s.split("-").map(Number);
  return new Date(y, m-1, d);
}
function todayIso() { return isoDate(new Date()); }

function getStatus(id) {
  return state.statuses.find(s => s.id === id) || state.statuses[0];
}
function getPriority(id) {
  return PRIORITIES.find(p => p.id === id) || PRIORITIES[0];
}
function getDept(id) {
  return (state.departments || []).find(d => d.id === id) || null;
}
// the department stage object for a task, or null
function taskStage(t, deptId) {
  return (t.deptStages || []).find(st => st.deptId === deptId) || null;
}
function isStatusDone(st) { return !!(st && st.isDone); }
function subtaskDone(st) {
  const s = getStatus(st.statusId);
  return isStatusDone(s);
}

function renderDeptSwitcher() {

// multi-select dropdown for the department view (stays open while ticking)
function openDeptDropdown(anchor) {
  document.querySelectorAll(".dept-dd-pop").forEach(n => n.remove());
  const pop = document.createElement("div");
  pop.className = "dept-dd-pop";
  const sel = new Set(activeViewDepts());
  pop.innerHTML = `
    <button type="button" class="dept-dd-item${sel.size === 0 ? " active" : ""}" data-all>ทุกแผนก</button>
    <div class="dept-dd-sep"></div>
    ${(state.departments || []).map(d => `
      <label class="dept-dd-item dept-dd-check">
        <input type="checkbox" data-dept="${d.id}" ${sel.has(d.id) ? "checked" : ""} />
        <span class="dept-dd-cdot" style="background:${d.color}"></span>
        <span>${escapeHtml(d.name)}</span>
      </label>`).join("")}
  `;
  document.body.appendChild(pop);
  const r = anchor.getBoundingClientRect();
  pop.style.top = (r.bottom + window.scrollY + 4) + "px";
  pop.style.left = (r.left + window.scrollX) + "px";
  pop.style.minWidth = r.width + "px";

  const refresh = () => {
    saveState();
    renderMainView();          // re-render calendar/gantt/dashboard + today panel, keep the popover open
    renderTodayPanel();
    const lbl = anchor.querySelector(".dept-dd-label"); if (lbl) lbl.textContent = deptViewLabel();
    pop.querySelector("[data-all]").classList.toggle("active", activeViewDepts().length === 0);
  };
  pop.querySelector("[data-all]").addEventListener("click", () => {
    state.settings.viewDepts = [];
    pop.querySelectorAll("input[data-dept]").forEach(cb => { cb.checked = false; });
    refresh();
  });
  pop.querySelectorAll("input[data-dept]").forEach(cb => {
    cb.addEventListener("change", () => {
      const arr = activeViewDepts();
      state.settings.viewDepts = cb.checked ? [...new Set([...arr, cb.dataset.dept])] : arr.filter(id => id !== cb.dataset.dept);
      refresh();
    });
  });
  function onDoc(e) { if (!pop.contains(e.target) && e.target !== anchor && !anchor.contains(e.target)) close(); }
  function onEsc(e) { if (e.key === "Escape") close(); }
  function close() { pop.remove(); document.removeEventListener("mousedown", onDoc, true); document.removeEventListener("keydown", onEsc, true); }
  setTimeout(() => { document.addEventListener("mousedown", onDoc, true); document.addEventListener("keydown", onEsc, true); }, 0);
}

/* ---------- Render: calendar ---------- */
function renderMonth() {
  document.getElementById("monthLabel").textContent =
    `${TH_MONTHS[view.month]} ${view.year + 543}`; // พ.ศ.

  const grid = document.getElementById("calGrid");
  grid.innerHTML = "";

  // monday-first
  const first = new Date(view.year, view.month, 1);
  const firstDow = (first.getDay() + 6) % 7; // 0 = Mon
  const startDate = new Date(view.year, view.month, 1 - firstDow);

  const todayStr = todayIso();
  const filter = currentFilter();
  const vDepts = activeViewDepts();
  const filteredTasks = state.tasks.filter(matchesFilter(filter));
  const tasksByDate = vDepts.length
    ? buildDeptItems(filteredTasks, vDepts)
    : buildCalendarItems(filteredTasks);

  for (let i = 0; i < 42; i++) {
    const d = new Date(startDate);
    d.setDate(startDate.getDate() + i);
    const iso = isoDate(d);
    const inMonth = d.getMonth() === view.month;
    const isWeekend = i % 7 === 5 || i % 7 === 6;

    const cell = document.createElement("div");
    cell.className = "cal-cell";
    if (!inMonth) cell.classList.add("other-month");
    if (isWeekend) cell.classList.add("weekend");
    if (iso === todayStr) cell.classList.add("today");
    cell.dataset.date = iso;

    const dayItems = tasksByDate[iso] || [];
    const isFirstOfRow = (i % 7) === 0;

    cell.innerHTML = `
      <div class="cell-head">
        <span class="cell-date">${d.getDate()}</span>
        <button class="cell-add" data-date="${iso}" title="เพิ่มงาน">+</button>
      </div>
      <div class="cell-tasks"></div>
    `;
    const taskWrap = cell.querySelector(".cell-tasks");
    // multi-day bars are placed by lane (with spacers for empty upper lanes) so each bar keeps
    // its row across every day it crosses; everything else stacks below in sorted order.
    const spans = dayItems.filter(it => it.kind === "project" && it.position !== "single");
    const rest  = dayItems.filter(it => !(it.kind === "project" && it.position !== "single"));
    if (spans.length) {
      const maxLane = spans.reduce((m, it) => Math.max(m, it.lane || 0), 0);
      const laneArr = new Array(maxLane + 1).fill(null);
      spans.forEach(it => { laneArr[it.lane || 0] = it; });
      laneArr.forEach(it => {
        if (it) {
          const showLabel = it.position === "start" || isFirstOfRow; // re-label on Mon week-wrap
          taskWrap.appendChild(renderTaskChip(it.task, it.position, showLabel));
        } else {
          taskWrap.appendChild(makeSpanGap());
        }
      });
    }
    rest.forEach(item => {
      if (item.kind === "deptstage") {
        taskWrap.appendChild(renderDeptChip(item.task, item.stage));
      } else if (item.kind === "deptcab") {
        taskWrap.appendChild(renderDeptCabChip(item.task, item.stage, item.sub));
      } else if (item.kind === "cabinet") {
        taskWrap.appendChild(renderCabinetChip(item.task, item.sub));
      } else {
        taskWrap.appendChild(renderTaskChip(item.task, item.position, true)); // single-day
      }
    });

    // dnd target
    cell.addEventListener("dragover", (e) => {
      if (dragTaskId || dragSub || dragStage || dragDeptCab) { e.preventDefault(); cell.classList.add("drop-target"); }
    });
    cell.addEventListener("dragleave", () => cell.classList.remove("drop-target"));
    cell.addEventListener("drop", (e) => {
      e.preventDefault();
      cell.classList.remove("drop-target");
      // dragging a department stage → move that stage's due date
      if (dragStage) {
        const t = state.tasks.find(x => x.id === dragStage.taskId);
        const stg = t && taskStage(t, dragStage.deptId);
        if (stg && stg.due !== iso) {
          const max = dateLimitViolation(t, dragStage.deptId, iso, null);
          if (max) { toast(dateLimitMsg(dragStage.deptId, max)); return; }
          stg.due = iso;
          logActivity(t, `เลื่อนกำหนดแผนก ${(getDept(stg.deptId)||{}).name||""} → ${formatDateTH(iso)}`);
          t.updatedAt = Date.now();
          saveState();
          renderAll();
        }
        return;
      }
      // dragging a per-cabinet department chip → set/move that cabinet's per-department date
      if (dragDeptCab) {
        const t = state.tasks.find(x => x.id === dragDeptCab.taskId);
        const s = t && (t.subtasks || []).find(x => x.id === dragDeptCab.subId);
        const did = dragDeptCab.deptId;
        if (s && (cabinetDeptDue(t, s, did) !== iso)) {
          const max = dateLimitViolation(t, did, iso, s);
          if (max) { toast(dateLimitMsg(did, max)); return; }
          if (!s.deptDates) s.deptDates = {};
          s.deptDates[did] = iso;
          logActivity(t, `เลื่อนวันตู้ “${s.text||"(ไม่มีชื่อ)"}” (แผนก ${(getDept(did)||{}).name||""}) → ${formatDateTH(iso)}`);
          t.updatedAt = Date.now();
          saveState();
          renderAll();
        }
        return;
      }
      // dragging a cabinet → set/move that subtask's own date
      if (dragSub) {
        const t = state.tasks.find(x => x.id === dragSub.taskId);
        const s = t && (t.subtasks || []).find(x => x.id === dragSub.subId);
        if (s && s.date !== iso) {
          s.date = iso;
          logActivity(t, `เลื่อนวันตู้ “${s.text||"(ไม่มีชื่อ)"}” → ${formatDateTH(iso)}`);
          t.updatedAt = Date.now();
          saveState();
          renderAll();
        }
        return;
      }
      if (!dragTaskId) return;
      const t = state.tasks.find(x => x.id === dragTaskId);
      if (t && t.date !== iso) {
        // shift due → new date, keep duration by shifting startDate the same amount
        if (t.startDate) {
          const diff = (fromIso(iso) - fromIso(t.date)) / 86400000;
          const ns = fromIso(t.startDate);
          ns.setDate(ns.getDate() + diff);
          t.startDate = isoDate(ns);
        }
        t.date = iso;
        logActivity(t, `เลื่อนวันครบกำหนด → ${formatDateTH(iso)}`);
        t.updatedAt = Date.now();
        saveState();
        renderAll();
      }
    });

    grid.appendChild(cell);
  }
}

function renderTaskChip(t, position = "single", showLabel = true) {
  const st = getStatus(t.statusId);
  const pr = getPriority(t.priority);
  const chip = document.createElement("div");
  chip.className = "task-chip";
  const isSpan = position !== "single";
  if (isSpan) chip.classList.add("span-" + position);
  if (!showLabel) chip.classList.add("span-empty");
  if (isStatusDone(st)) chip.classList.add("done");
  chip.style.setProperty("--chip-bg", hexToBgTint(st.color));
  chip.style.setProperty("--chip-color", st.color);
  chip.draggable = true;
  chip.dataset.id = t.id;
  // breakdown of cabinets (subtasks) by status — numeric badges colored by status
  const counts = subStatusCounts(t);
  const breakdown = state.statuses.filter(s => counts[s.id]);
  const breakdownText = breakdown.map(s => `${s.name}: ${counts[s.id]}`).join(", ");
  chip.title = t.title
    + (t.startDate && t.startDate !== t.date ? `\n${formatDateTH(t.startDate)} → ${formatDateTH(t.date)}` : "")
    + (breakdownText ? `\nตู้ — ${breakdownText}` : "");

  const badges = breakdown.map(s =>

  // identical 2-line card for single-day AND multi-day spans → uniform height,
  // sub-status numbers stay on the 2nd row. Continuation pieces get .span-empty
  // which hides the content (visibility) but keeps the height so the bar stays even.
  const badgeRow = (badges || flag) ? `<div class="task-substatus">${badges}${flag}</div>` : "";
  // selected custom-field values flagged to show on chips (only on the full single-day card)
  const fchips = (position === "single") ? taskFieldChips(t) : [];
  const fieldRow = fchips.length ? `<div class="chip-fields">${fchips.map(f =>
    `<span class="chip-field" title="${escapeHtml(f.name)}: ${escapeHtml(f.label)}">${escapeHtml(f.label)}</span>`).join("")}</div>` : "";
  chip.innerHTML = `<div class="chip-title-row"><span class="task-title">${escapeHtml(t.title)}</span>${alertPin(t)}</div>${badgeRow}${fieldRow}`;
  chip.addEventListener("click", (e) => { e.stopPropagation(); openTaskModal(t.id); });
  chip.addEventListener("dragstart", (e) => {
    dragTaskId = t.id;
    chip.classList.add("dragging");
    e.dataTransfer.effectAllowed = "move";
  });
  chip.addEventListener("dragend", () => {
    dragTaskId = null;
    chip.classList.remove("dragging");
    document.querySelectorAll(".drop-target").forEach(el => el.classList.remove("drop-target"));
  });
  return chip;
}

function groupTasksByDate(tasks) {
  /* Returns { iso: [{task, position}] }
     position: "single" | "start" | "mid" | "end"
     A task with startDate < date occupies every day in [startDate..date]. */
  const out = {};
  const push = (iso, item) => { (out[iso] = out[iso] || []).push(item); };

  tasks.forEach(t => {
    if (!t.date) return;
    const start = (t.startDate && t.startDate < t.date) ? t.startDate : t.date;
    if (start === t.date) {
      push(t.date, { task: t, position: "single" });
      return;
    }
    const sd = fromIso(start), ed = fromIso(t.date);
    const days = [];
    for (let d = new Date(sd); d <= ed; d.setDate(d.getDate()+1)) days.push(isoDate(d));
    days.forEach((iso, i) => {
      let pos = "mid";
      if (i === 0) pos = "start";
      else if (i === days.length - 1) pos = "end";
      push(iso, { task: t, position: pos });
    });
  });

  // sort within each day: multi-day first, priority desc, title asc, id (stable)
  const prRank = { urgent:4, high:3, medium:2, low:1, none:0 };
  Object.values(out).forEach(arr => arr.sort((a,b) => {
    const am = a.position !== "single" ? 1 : 0;
    const bm = b.position !== "single" ? 1 : 0;
    if (am !== bm) return bm - am;
    const dp = (prRank[b.task.priority]||0) - (prRank[a.task.priority]||0);
    if (dp) return dp;
    const dt = a.task.title.localeCompare(b.task.title, "th");
    if (dt) return dt;
    return a.task.id.localeCompare(b.task.id);
  }));
  return out;
}

/* Assign each multi-day task a fixed lane (row) for the whole month, Gantt-style:
   the LONGEST bar takes the top lane (0); the rest greedily fill the lowest free lane whose
   bars don't overlap in time. A task keeps its lane on every day it spans, so the bar stays on
   one row from head to tail (and across week wraps). Returns { taskId: laneIndex }. */
function assignSpanLanes(tasks) {
  const spans = tasks
    .filter(t => t.date && t.startDate && t.startDate < t.date)
    .map(t => ({ id: t.id, s: t.startDate, e: t.date, len: fromIso(t.date) - fromIso(t.startDate) }))
    .sort((a, b) => (b.len - a.len) || a.s.localeCompare(b.s) || a.id.localeCompare(b.id));
  const lanes = [];      // lanes[i] = list of {s,e} ranges already on that lane
  const laneOf = {};
  spans.forEach(sp => {
    let lane = 0;
    for (;;) {
      const occ = lanes[lane] || (lanes[lane] = []);
      const clash = occ.some(o => sp.s <= o.e && o.s <= sp.e); // inclusive date-range overlap
      if (!clash) { occ.push(sp); laneOf[sp.id] = lane; break; }
      lane++;
    }
  });
  return laneOf;
}
// empty fixed-height filler for a lane with no bar in this cell (keeps lower bars aligned)
function makeSpanGap() {
  const g = document.createElement("div");
  g.className = "span-gap";
  return g;
}

/* Combine project spans + cabinet chips (subtasks with their own date).
   Returns { iso: [ {kind:'project',task,position,lane?} | {kind:'cabinet',task,sub} ] } */
function buildCalendarItems(tasks) {
  const byDate = groupTasksByDate(tasks);
  const laneOf = assignSpanLanes(tasks);
  const out = {};
  for (const iso in byDate) {
    out[iso] = byDate[iso].map(x => ({
      kind: "project", task: x.task, position: x.position,
      lane: x.position !== "single" ? (laneOf[x.task.id] || 0) : undefined,
    }));
  }
  if (state.settings.showCabinetChips) {
    tasks.forEach(t => {
      (t.subtasks || []).forEach(s => {
        if (s.date) {
          (out[s.date] = out[s.date] || []).push({ kind: "cabinet", task: t, sub: s });
        }
      });
    });
  }
  // sort each day: projects first (spans, then priority), then cabinets (by project, name)
  const prRank = { urgent:4, high:3, medium:2, low:1, none:0 };
  Object.values(out).forEach(arr => arr.sort((a,b) => {
    if (a.kind !== b.kind) return a.kind === "project" ? -1 : 1;
    if (a.kind === "project") {
      const am = a.position !== "single" ? 1 : 0;
      const bm = b.position !== "single" ? 1 : 0;
      if (am !== bm) return bm - am;
      return (prRank[b.task.priority]||0) - (prRank[a.task.priority]||0)
        || a.task.title.localeCompare(b.task.title, "th")
        || a.task.id.localeCompare(b.task.id);
    }
    return a.task.title.localeCompare(b.task.title, "th")
      || (a.sub.text||"").localeCompare(b.sub.text||"", "th");
  }));
  return out;
}

/* Department-view items. Default: one chip per project on that department's due date.
   When settings.deptCalByCabinet is on: split a project into one chip per cabinet, each on its
   per-department date (cabinetDeptDue). Projects with no cabinets stay as a single dept chip.
   Accepts one deptId or an array of deptIds (multi-select view).
   Returns { iso: [{kind:'deptstage'|'deptcab', task, stage, sub?}] } */
function buildDeptItems(tasks, deptIds) {
  const depts = Array.isArray(deptIds) ? deptIds : [deptIds];
  const out = {};
  const byCab = !!(state.settings && state.settings.deptCalByCabinet);
  const push = (iso, item) => { if (iso) (out[iso] = out[iso] || []).push(item); };
  tasks.forEach(t => {
    depts.forEach(deptId => {
      const stg = taskStage(t, deptId);
      if (!stg) return;
      const subs = t.subtasks || [];
      if (byCab && subs.length) {
        subs.forEach(sub => push(cabinetDeptDue(t, sub, deptId), { kind: "deptcab", task: t, stage: stg, sub }));
      } else {
        push(stg.due, { kind: "deptstage", task: t, stage: stg });
      }
    });
  });
  const prRank = { urgent:4, high:3, medium:2, low:1, none:0 };
  Object.values(out).forEach(arr => arr.sort((a,b) =>
    (prRank[b.task.priority]||0) - (prRank[a.task.priority]||0)
    || a.task.title.localeCompare(b.task.title, "th")
    || (a.sub?.text||"").localeCompare(b.sub?.text||"", "th")));
  return out;
}

function currentFilter() {
  return {
    search: (document.getElementById("searchInput").value || "").trim().toLowerCase(),
    priority: state.settings.filterPriority || "all",
  };
}
function matchesFilter(filter) {
  return (t) => {
    if (filter.priority && filter.priority !== "all" && t.priority !== filter.priority) return false;
    if (filter.search) {
      const hay = (t.title + " " + (t.description||"") + " " + (t.labels||[]).join(" ")).toLowerCase();
      if (!hay.includes(filter.search)) return false;
    }
    return true;
  };
}

/* ---------- Helpers ---------- */
function escapeHtml(s) {
  return String(s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}
/* Floating status picker — anchored to an element, calls onChange(newStatusId) */
function openStatusPopover(anchorEl, currentId, onChange) {
  // close any open popover first
  document.querySelectorAll(".status-popover").forEach(n => n.remove());

  const pop = document.createElement("div");
  pop.className = "status-popover";
  state.statuses.forEach(s => {
    const row = document.createElement("div");
    row.className = "status-popover-item" + (s.id === currentId ? " active" : "");
    row.innerHTML = `
      <span class="dot" style="background:${s.color}"></span>
      <span class="name">${escapeHtml(s.name)}</span>
      ${s.isDone ? `<span class="done-badge">เสร็จ</span>` : ""}
      <span class="check">✓</span>
    `;
    row.addEventListener("click", (e) => {
      e.stopPropagation();
      close();
      onChange(s.id);
    });
    pop.appendChild(row);
  });
  document.body.appendChild(pop);

  // position below anchor, flip if needed
  const rect = anchorEl.getBoundingClientRect();
  const popRect = pop.getBoundingClientRect();
  let top = rect.bottom + window.scrollY + 6;
  let left = rect.left + window.scrollX;
  if (left + popRect.width > window.innerWidth - 10) {
    left = window.innerWidth - popRect.width - 10;
  }
  if (rect.bottom + popRect.height + 12 > window.innerHeight) {
    top = rect.top + window.scrollY - popRect.height - 6;
  }
  pop.style.top = top + "px";
  pop.style.left = left + "px";

  function close() {
    pop.remove();
    document.removeEventListener("mousedown", onDoc, true);
    document.removeEventListener("keydown", onEsc, true);
  }
  function onDoc(e) {
    if (!pop.contains(e.target) && e.target !== anchorEl) close();
  }
  function onEsc(e) { if (e.key === "Escape") close(); }
  setTimeout(() => {
    document.addEventListener("mousedown", onDoc, true);
    document.addEventListener("keydown", onEsc, true);
  }, 0);
}

/* Floating checklist editor for one cabinet (sub).
   onChange() fires after any change so the caller can repaint/save. */
let _clPopAnchor = null;
function openChecklistPopover(anchorEl, sub, onChange, opts = {}) {
  // already open on this anchor → keep (prevents hover-flicker)
  if (_clPopAnchor === anchorEl && document.querySelector(".checklist-popover")) return;
  document.querySelectorAll(".checklist-popover").forEach(n => n.remove());
  _clPopAnchor = anchorEl;
  if (!Array.isArray(sub.checklist)) sub.checklist = makeCabinetChecklist();
  const deptId = opts.deptId || null;   // limit to one department's items, or null = all (grouped)
  const task = opts.task || null;       // for auto-logging department completion

  const pop = document.createElement("div");
  pop.className = "checklist-popover";

  function paintBar() {
    const p = checklistProgress(sub, deptId);
    const bar = pop.querySelector(".cl-pop-bar");
    const pct = pop.querySelector(".cl-pop-pct");
    if (bar) { bar.style.width = p.pct + "%"; bar.style.background = p.pct === 100 ? "#10b981" : "var(--accent)"; }
    if (pct) pct.textContent = `${p.done}/${p.total} · ${p.pct}%`;
  }
  function buildItemRow(it) {
    const r = document.createElement("div");
    r.className = "cl-pop-item" + (it.done ? " done" : "");
    r.innerHTML = `
      <input type="checkbox" ${it.done ? "checked" : ""} />
      <input type="text" class="cl-item-name" value="${escapeHtml(it.text)}" placeholder="รายการ..." />
      <button type="button" class="cl-item-del" title="ลบ">✕</button>
    `;
    const [cb, nameI, delB] = r.children;
    cb.addEventListener("change", () => {
      const was = task ? isDeptComplete(task, it.deptId) : false;
      it.done = cb.checked;
      r.classList.toggle("done", cb.checked);
      if (task) {
        const now = isDeptComplete(task, it.deptId);
        const dn = (getDept(it.deptId) || {}).name || "";
        if (!was && now) logActivity(task, `✓ แผนก ${dn} เสร็จ`);
        else if (was && !now) logActivity(task, `ยกเลิกเสร็จ แผนก ${dn}`);
      }
      paintBar();
      onChange && onChange();
    });
    nameI.addEventListener("input", () => { it.text = nameI.value; onChange && onChange(); });
    nameI.addEventListener("keydown", (e) => { if (e.key === "Enter") { e.preventDefault(); addItem(it.deptId); } });
    delB.addEventListener("click", () => {
      const idx = sub.checklist.indexOf(it);
      if (idx >= 0) sub.checklist.splice(idx, 1);
      render(); paintBar(); onChange && onChange();
    });
    return r;
  }
  function render() {
    const p = checklistProgress(sub, deptId);
    const title = deptId ? `Checklist · ${escapeHtml((getDept(deptId) || {}).name || "")}` : "Checklist (ทุกแผนก)";
    pop.innerHTML = `
      <div class="cl-pop-head">
        <span class="cl-pop-title">${title}</span>
        <span class="cl-pop-pct">${p.done}/${p.total} · ${p.pct}%</span>
      </div>
      <div class="cl-pop-track"><div class="cl-pop-bar" style="width:${p.pct}%;background:${p.pct===100?'#10b981':'var(--accent)'}"></div></div>
      <div class="cl-pop-items" data-items></div>
      ${deptId ? `<button type="button" class="cl-pop-add" data-act="add">+ เพิ่มรายการ</button>` : ""}
    `;
    const itemsEl = pop.querySelector("[data-items]");
    if (deptId) {
      sub.checklist.filter(i => i.deptId === deptId).forEach(it => itemsEl.appendChild(buildItemRow(it)));
      pop.querySelector('[data-act="add"]').addEventListener("click", () => addItem(deptId));
    } else {
      // grouped by department
      (state.departments || []).forEach(d => {

        if (!items.length) return;

        grp.innerHTML = `<span class="cl-pop-group-dot" style="background:${d.color}"></span>${escapeHtml(d.name)} <span class="cl-pop-group-add" title="เพิ่มรายการ">+</span>`;
        grp.querySelector(".cl-pop-group-add").addEventListener("click", (e) => { e.stopPropagation(); addItem(d.id); });
        itemsEl.appendChild(grp);
        items.forEach(it => itemsEl.appendChild(buildItemRow(it)));
      });
      if (sub.checklist.length === 0) {
        itemsEl.innerHTML = `<div class="cl-pop-empty">ยังไม่มีรายการ — เพิ่มเช็คลิสต์ของแผนกได้ที่ ⚙ ตั้งค่า › แผนก</div>`;
      }
    }
  }
  function addItem(forDeptId) {
    const dept = forDeptId || deptId || (state.departments[0] && state.departments[0].id);
    sub.checklist.push({ id: uid("cl"), text: "", done: false, deptId: dept });
    render();
    const inputs = pop.querySelectorAll(".cl-item-name");
    inputs[inputs.length - 1]?.focus();
    onChange && onChange();
  }
  render();
  document.body.appendChild(pop);

  // position under anchor, flip if needed
  const rect = anchorEl.getBoundingClientRect();
  const pr = pop.getBoundingClientRect();
  let top = rect.bottom + window.scrollY + 6;
  let left = rect.left + window.scrollX;
  if (left + pr.width > window.innerWidth - 10) left = window.innerWidth - pr.width - 10;
  if (rect.bottom + pr.height + 12 > window.innerHeight) top = rect.top + window.scrollY - pr.height - 6;
  // keep fully on-screen (popover height is capped by CSS max-height, so this always fits)
  top = Math.max(window.scrollY + 8, Math.min(top, window.scrollY + window.innerHeight - pr.height - 8));
  pop.style.top = top + "px";
  pop.style.left = Math.max(8, left) + "px";

  // close when the pointer leaves BOTH the button and the popover (grace delay,
  // and stay open while typing inside the popover)
  let closeTimer = null;
  function scheduleClose() {
    clearTimeout(closeTimer);
    closeTimer = setTimeout(() => {
      const stillHovering = anchorEl.matches(":hover") || pop.matches(":hover");
      if (!stillHovering && !pop.contains(document.activeElement)) close();
    }, 250);
  }
  function cancelClose() { clearTimeout(closeTimer); }
  pop.addEventListener("mouseenter", cancelClose);
  pop.addEventListener("mouseleave", scheduleClose);
  anchorEl.addEventListener("mouseenter", cancelClose);
  anchorEl.addEventListener("mouseleave", scheduleClose);

  function close() {
    clearTimeout(closeTimer);
    pop.remove();
    if (_clPopAnchor === anchorEl) _clPopAnchor = null;
    document.removeEventListener("mousedown", onDoc, true);
    document.removeEventListener("keydown", onEsc, true);
    anchorEl.removeEventListener("mouseenter", cancelClose);
    anchorEl.removeEventListener("mouseleave", scheduleClose);
  }
  function onDoc(e) {
    if (!pop.contains(e.target) && e.target !== anchorEl && !anchorEl.contains(e.target)) close();
  }
  function onEsc(e) { if (e.key === "Escape") close(); }
  setTimeout(() => {
    document.addEventListener("mousedown", onDoc, true);
    document.addEventListener("keydown", onEsc, true);
  }, 0);
}

/* ---------- Custom dd/mm/yyyy date field + calendar picker ---------- */
// parse "dd/mm/yyyy" (year as พ.ศ. if >=2400, else ค.ศ.) -> ISO yyyy-mm-dd, or null
function parseDateInput(str) {
  const m = String(str).trim().match(/^(\d{1,2})\s*[\/\-.]\s*(\d{1,2})\s*[\/\-.]\s*(\d{2,4})$/);
  if (!m) return null;
  let dd = +m[1], mm = +m[2], yy = +m[3];
  if (yy < 100) yy += 2500;       // 2-digit -> assume พ.ศ. 25xx
  if (yy >= 2400) yy -= 543;      // พ.ศ. -> ค.ศ.
  if (mm < 1 || mm > 12 || dd < 1 || dd > 31) return null;
  const d = new Date(yy, mm - 1, dd);
  if (d.getFullYear() !== yy || d.getMonth() !== mm - 1 || d.getDate() !== dd) return null;
  return isoDate(d);
}

function createDateField({ value = null, allowClear = false, onChange = () => {}, extraClass = "" } = {}) {
  const wrap = document.createElement("div");
  wrap.className = "datefield" + (extraClass ? " " + extraClass : "");
  wrap.innerHTML = `
    <input type="text" class="datefield-input" placeholder="dd/mm/yyyy" inputmode="numeric" autocomplete="off" />
    <button type="button" class="datefield-cal" tabindex="-1" title="เลือกวันที่">📅</button>
    ${allowClear ? `<button type="button" class="datefield-clear" tabindex="-1" title="ล้างวันที่">✕</button>` : ""}
  `;
  const input = wrap.querySelector(".datefield-input");
  const calBtn = wrap.querySelector(".datefield-cal");
  const clearBtn = wrap.querySelector(".datefield-clear");
  let cur = value || null;

  function paint() {
    input.value = cur ? formatDateTH(cur) : "";
    wrap.classList.toggle("has-date", !!cur);
    if (clearBtn) clearBtn.style.display = cur ? "" : "none";
  }
  function set(iso, fire = true) {
    cur = iso || null;
    paint();
    if (fire) onChange(cur);
  }
  function commitText() {
    const t = input.value.trim();
    if (!t) { if (allowClear) set(null); else paint(); return; }
    const iso = parseDateInput(t);
    if (iso) set(iso); else paint(); // revert to last valid on bad input
  }
  input.addEventListener("blur", commitText);
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") { e.preventDefault(); commitText(); }
  });
  calBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    openCalendarPopover(wrap, cur, (iso) => set(iso));
  });
  if (clearBtn) clearBtn.addEventListener("click", (e) => { e.stopPropagation(); set(null); input.focus(); });

  paint();
  wrap.getValue = () => cur;
  wrap.setValue = (iso) => set(iso, false);
  return wrap;
}

function openCalendarPopover(anchorEl, currentIso, onPick) {
  document.querySelectorAll(".dp-cal").forEach(n => n.remove());
  const today = todayIso();
  let vy, vm;
  const base = currentIso ? fromIso(currentIso) : new Date();
  vy = base.getFullYear(); vm = base.getMonth();

  const pop = document.createElement("div");
  pop.className = "dp-cal";

  function render() {
    const first = new Date(vy, vm, 1);
    const firstDow = (first.getDay() + 6) % 7; // monday-first
    const start = new Date(vy, vm, 1 - firstDow);
    let cells = "";
    for (let i = 0; i < 42; i++) {
      const d = new Date(start); d.setDate(start.getDate() + i);
      const iso = isoDate(d);
      const cls = ["dp-day"];
      if (d.getMonth() !== vm) cls.push("other");
      if (iso === today) cls.push("today");
      if (iso === currentIso) cls.push("selected");
      cells += `<button type="button" class="${cls.join(" ")}" data-iso="${iso}">${d.getDate()}</button>`;
    }
    pop.innerHTML = `
      <div class="dp-head">
        <button type="button" class="dp-nav" data-nav="-1" title="เดือนก่อนหน้า">‹</button>
        <span class="dp-title">${TH_MONTHS[vm]} ${vy + 543}</span>
        <button type="button" class="dp-nav" data-nav="1" title="เดือนถัดไป">›</button>
      </div>
      <div class="dp-grid dp-dow"><span>จ</span><span>อ</span><span>พ</span><span>พฤ</span><span>ศ</span><span>ส</span><span>อา</span></div>
      <div class="dp-grid dp-days">${cells}</div>
    `;
    pop.querySelectorAll("[data-nav]").forEach(b => b.addEventListener("click", (e) => {
      e.stopPropagation();
      vm += (+b.dataset.nav);
      if (vm < 0) { vm = 11; vy--; }
      if (vm > 11) { vm = 0; vy++; }
      render();
    }));
    pop.querySelectorAll(".dp-day").forEach(b => b.addEventListener("click", (e) => {
      e.stopPropagation();
      onPick(b.dataset.iso);
      close();
    }));
  }
  render();
  document.body.appendChild(pop);

  const rect = anchorEl.getBoundingClientRect();
  const pr = pop.getBoundingClientRect();
  let top = rect.bottom + window.scrollY + 6;
  let left = rect.left + window.scrollX;
  if (left + pr.width > window.innerWidth - 10) left = window.innerWidth - pr.width - 10;
  if (rect.bottom + pr.height + 12 > window.innerHeight) top = rect.top + window.scrollY - pr.height - 6;
  pop.style.top = top + "px";
  pop.style.left = Math.max(8, left) + "px";

  function close() {
    pop.remove();
    document.removeEventListener("mousedown", onDoc, true);
    document.removeEventListener("keydown", onEsc, true);
  }
  function onDoc(e) { if (!pop.contains(e.target) && !anchorEl.contains(e.target)) close(); }
  function onEsc(e) { if (e.key === "Escape") close(); }
  setTimeout(() => {
    document.addEventListener("mousedown", onDoc, true);
    document.addEventListener("keydown", onEsc, true);
  }, 0);
}

function hexToBgTint(hex) {
  // light tint of color (mix with white ~85%)
  const c = hex.replace("#","");
  const r = parseInt(c.slice(0,2),16);
  const g = parseInt(c.slice(2,4),16);
  const b = parseInt(c.slice(4,6),16);
  const mix = (x) => Math.round(x*0.18 + 255*0.82);
  return `rgb(${mix(r)},${mix(g)},${mix(b)})`;
}

/* ---------- In-app confirm dialog (replaces browser confirm) ---------- */
function confirmDialog({ title, message = "", confirmText = "ลบ", cancelText = "ยกเลิก", danger = true, icon = "🗑️" }) {
  return new Promise(resolve => {
    const overlay = document.createElement("div");
    overlay.className = "overlay confirm-overlay";
    overlay.innerHTML = `
      <div class="confirm-dialog" role="alertdialog" aria-modal="true">
        <div class="confirm-icon ${danger ? "danger" : ""}">${icon}</div>
        <div class="confirm-title">${escapeHtml(title)}</div>
        ${message ? `<div class="confirm-msg">${escapeHtml(message)}</div>` : ""}
        <div class="confirm-actions">
          <button class="btn" data-act="cancel">${escapeHtml(cancelText)}</button>
          <button class="btn ${danger ? "btn-danger-solid" : "btn-primary"}" data-act="ok">${escapeHtml(confirmText)}</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    function close(val) {
      overlay.remove();
      document.removeEventListener("keydown", onKey, true);
      resolve(val);
    }
    function onKey(e) {
      if (e.key === "Escape") { e.preventDefault(); e.stopPropagation(); close(false); }
      else if (e.key === "Enter") { e.preventDefault(); e.stopPropagation(); close(true); }
    }
    overlay.querySelector('[data-act="cancel"]').addEventListener("click", () => close(false));
    overlay.querySelector('[data-act="ok"]').addEventListener("click", () => close(true));
    overlay.addEventListener("mousedown", (e) => { if (e.target === overlay) close(false); });
    document.addEventListener("keydown", onKey, true);
    setTimeout(() => overlay.querySelector('[data-act="ok"]').focus(), 30);
  });
}

/* Duplicate a project: clone structure + dates, reset progress.
   New ids for task/cabinets/checklist; status → first; checklist ticks, stage "done" and Activity cleared.
   Kept: title (+ " (สำเนา)"), all dates, departments/stages, custom-field values, labels, checklist items. */
function duplicateTask(src) {
  const firstStatus = (state.statuses[0] || {}).id;
  const c = JSON.parse(JSON.stringify(src));
  c.id = uid("t");
  c.title = (src.title || "งาน") + " (สำเนา)";
  c.statusId = firstStatus;
  c.comments = [];
  c.createdAt = Date.now();
  c.updatedAt = Date.now();
  (c.subtasks || []).forEach(s => {
    s.id = uid("sub");
    s.statusId = firstStatus;
    (s.checklist || []).forEach(it => { it.id = uid("cl"); it.done = false; });
  });
  (c.deptStages || []).forEach(stg => { stg.done = false; });   // keep due + fields, reset the manual done tick
  logActivity(c, `สร้างจากการทำซ้ำ “${src.title || "งาน"}”`);
  return c;
}
