/* ---------- Dashboard (progress overview) ---------- */
function overallChecklist(t) {
  return (t.subtasks || []).reduce((a, s) => { const p = checklistProgress(s); a.done += p.done; a.total += p.total; return a; }, { done: 0, total: 0 });
}
function projectProgress(t) {
  const cl = overallChecklist(t);
  if (cl.total > 0) return { done: cl.done, total: cl.total, pct: Math.round(cl.done / cl.total * 100) };
  const c = taskCabProgress(t);
  return { done: c.done, total: c.total, pct: c.total ? Math.round(c.done / c.total * 100) : 0 };
}
function projectComplete(t) {
  if ((t.deptStages || []).length) return t.deptStages.every(s => isDeptComplete(t, s.deptId));
  return isStatusDone(getStatus(t.statusId));
}
function dashBar(pct, color) {
  return `<div class="dash-bar"><div class="dash-bar-fill" style="width:${pct}%;background:${color || (pct === 100 ? '#10b981' : 'var(--accent)')}"></div></div>`;
}

// all-projects dashboard (active board)
function renderDashboard() {
  const wrap = document.getElementById("dashWrap");
  document.getElementById("monthLabel").textContent = "แดชบอร์ด";
  const today = todayIso();
  const allTasks = state.tasks.filter(matchesFilter(currentFilter()));
  if (dashDept && !getDept(dashDept)) dashDept = null;   // validate filter
  const dep = dashDept;

  // metrics scoped to the dept filter (or whole project when no filter)
  const inScope = t => dep ? !!taskStage(t, dep) : true;
  const prog = t => dep ? deptProgress(t, dep) : overallChecklist(t);          // {done,total}
  const isComp = t => dep ? isDeptComplete(t, dep) : projectComplete(t);
  const dueOf = t => dep ? ((taskStage(t, dep) || {}).due || null) : t.date;
  const pctOf = t => { const p = prog(t); return p.total > 0 ? Math.round(p.done / p.total * 100) : (isComp(t) ? 100 : 0); };

  const tasks = allTasks.filter(inScope);
  const total = tasks.length;
  const completed = tasks.filter(isComp).length;
  const overdue = tasks.filter(t => { if (isComp(t)) return false; const d = dueOf(t); return d && d < today; }).length;
  let od = 0, ot = 0; tasks.forEach(t => { const p = prog(t); od += p.done; ot += p.total; });
  const pct = ot ? Math.round(od / ot * 100) : 0;

  // per-department overview (always all depts) + overdue count per dept
  const deptRows = (state.departments || []).map(d => {
    let dd = 0, dt = 0, using = 0, projDone = 0, projOverdue = 0;
    allTasks.forEach(t => {
      const stg = taskStage(t, d.id); if (!stg) return;
      using++; const p = deptProgress(t, d.id); dd += p.done; dt += p.total;
      if (isDeptComplete(t, d.id)) projDone++;
      else if (stg.due && stg.due < today) projOverdue++;
    });
    return { d, done: dd, total: dt, pct: dt ? Math.round(dd / dt * 100) : 0, using, projDone, projOverdue };
  }).filter(r => r.using > 0);

  // workload by week — incomplete in-scope projects bucketed by (scoped) due date
  const buckets = [
    { label: "เลยกำหนด", danger: true, n: 0 },
    { label: "ภายใน 7 วัน", n: 0 },
    { label: "8–14 วัน", n: 0 },
    { label: "15–21 วัน", n: 0 },
    { label: "22+ วัน", n: 0 },
  ];
  tasks.forEach(t => {
    if (isComp(t)) return;
    const d = dueOf(t); if (!d) return;
    const diff = Math.round((fromIso(d) - fromIso(today)) / 86400000);
    buckets[diff < 0 ? 0 : diff < 7 ? 1 : diff < 14 ? 2 : diff < 21 ? 3 : 4].n++;
  });
  const maxN = Math.max(1, ...buckets.map(b => b.n));

  const prRank = { urgent: 4, high: 3, medium: 2, low: 1, none: 0 };
  const sorted = tasks.slice().sort((a, b) =>
    (isComp(a) - isComp(b)) || ((dueOf(a) || "9999").localeCompare(dueOf(b) || "9999")) || (prRank[b.priority] || 0) - (prRank[a.priority] || 0));

  const filterHtml = `
    <div class="dash-filter">
      <span class="dash-filter-lbl">กรองแผนก:</span>
      <button class="dept-chip${!dep ? ' active' : ''}" data-df="">ทุกแผนก</button>
      ${(state.departments || []).map(d => `<button class="dept-chip${dep === d.id ? ' active' : ''}" data-df="${d.id}"><span class="dept-chip-dot" style="background:${d.color}"></span>${escapeHtml(d.name)}</button>`).join("")}
      <button class="btn btn-sm dash-print-hide" data-act="print" title="พิมพ์ / บันทึกเป็น PDF" style="margin-left:auto">🖨️ พิมพ์ / PDF</button>
    </div>`;

  const scopeLbl = dep ? ` · แผนก ${escapeHtml((getDept(dep) || {}).name || "")}` : "";
  const statHtml = `
    <div class="dash-stats">
      <div class="dash-stat"><div class="dash-stat-num">${total}</div><div class="dash-stat-lbl">โปรเจค${dep ? "ในแผนก" : "ทั้งหมด"}</div></div>
      <div class="dash-stat green"><div class="dash-stat-num">${completed}</div><div class="dash-stat-lbl">เสร็จแล้ว</div></div>
      <div class="dash-stat accent"><div class="dash-stat-num">${total - completed}</div><div class="dash-stat-lbl">กำลังทำ</div></div>
      <div class="dash-stat danger"><div class="dash-stat-num">${overdue}</div><div class="dash-stat-lbl">เลยกำหนด</div></div>
      <div class="dash-stat"><div class="dash-stat-num">${pct}%</div><div class="dash-stat-lbl">เช็คลิสต์${dep ? "แผนกนี้" : "รวม"} (${od}/${ot})</div></div>
    </div>`;

  const workloadHtml = `
    <div class="dash-h">ภาระงานรายสัปดาห์${scopeLbl} <span class="dash-h-sub">(งานที่ยังไม่เสร็จ ตามวันครบกำหนด)</span></div>
    <div class="dash-chart">
      ${buckets.map(b => `
        <div class="dash-col">
          <div class="dash-col-barwrap"><div class="dash-col-bar${b.danger ? ' danger' : ''}" style="height:${b.n ? Math.round(b.n / maxN * 100) : 0}%"><span class="dash-col-n">${b.n}</span></div></div>
          <div class="dash-col-lbl">${b.label}</div>
        </div>`).join("")}
    </div>`;

  const deptHtml = deptRows.length ? `
    <div class="dash-h">ความคืบหน้าแต่ละแผนก</div>
    <div class="dash-deptlist">
      ${deptRows.map(r => `
        <div class="dash-deptrow">
          <span class="dash-deptdot" style="background:${r.d.color}"></span>
          <span class="dash-deptname">${escapeHtml(r.d.name)}</span>
          ${dashBar(r.total ? r.pct : Math.round(r.projDone / r.using * 100), r.d.color)}
          <span class="dash-deptval">${r.total ? `${r.done}/${r.total} (${r.pct}%) · ` : ""}เสร็จ ${r.projDone}/${r.using}${r.projOverdue ? ` <span class="dash-dept-od">เลย ${r.projOverdue}</span>` : ""}</span>
        </div>`).join("")}
    </div>` : "";

  const cardsHtml = sorted.length ? `
    <div class="dash-h">โปรเจค${dep ? "ในแผนกนี้" : "ทั้งหมด"} (${sorted.length})</div>
    <div class="dash-cards">
      ${sorted.map(t => {
        const pr = getPriority(t.priority);
        const comp = isComp(t);
        const due = dueOf(t);
        const od2 = due && due < today && !comp;
        const dotStages = dep ? (t.deptStages || []).filter(s => s.deptId === dep) : (t.deptStages || []);
        const dots = dotStages.map(s => { const d = getDept(s.deptId) || {}; const dn = isDeptComplete(t, s.deptId); return `<span class="dash-dot${dn ? ' done' : ''}" style="background:${d.color || '#888'}" title="${escapeHtml(d.name || '')}: ${dn ? 'เสร็จ' : 'ยังไม่เสร็จ'}"></span>`; }).join("");
        return `
          <div class="dash-card${comp ? ' complete' : ''}" data-id="${t.id}">
            <div class="dash-card-head">
              <span class="dash-card-title">${pr.id !== 'none' ? priFlag(pr) + ' ' : ''}${escapeHtml(t.title)}</span>
              <span class="dash-card-due${od2 ? ' overdue' : ''}">${due ? (od2 ? `เลย ${Math.round((fromIso(today) - fromIso(due)) / 86400000)} วัน` : formatDateTH(due)) : '—'}</span>
            </div>
            ${dashBar(pctOf(t))}
            <div class="dash-card-meta">
              <span class="dash-pct">${pctOf(t)}%</span>
              <span class="dash-cabs">🗄️ ${(t.subtasks || []).length} ตู้</span>
              <span class="dash-dots">${dots}</span>
            </div>
          </div>`;
      }).join("")}
    </div>` : `<div class="dash-empty">ไม่มีโปรเจค${dep ? "ในแผนกนี้" : "ในปฏิทินนี้"}</div>`;

  wrap.innerHTML = `<div class="dash-inner">${filterHtml}${statHtml}${workloadHtml}${deptHtml}${cardsHtml}</div>`;
  wrap.querySelectorAll("[data-df]").forEach(b => b.addEventListener("click", () => { dashDept = b.dataset.df || null; renderDashboard(); }));
  wrap.querySelector('[data-act="print"]')?.addEventListener("click", () => window.print());
  wrap.querySelectorAll(".dash-card").forEach(c => c.addEventListener("click", () => openProjectDashboard(c.dataset.id)));
}

// single-project dashboard popup
function openProjectDashboard(t) {
  if (typeof t === "string") t = state.tasks.find(x => x.id === t);
  if (!t) return;
  const today = todayIso();
  const st = getStatus(t.statusId), pr = getPriority(t.priority);
  const pp = projectProgress(t), comp = projectComplete(t);
  const start = (t.startDate && t.startDate < t.date) ? t.startDate : null;
  const od = t.date && t.date < today && !comp;
  const daysLeft = t.date ? Math.round((fromIso(t.date) - fromIso(today)) / 86400000) : null;
  const dueText = (daysLeft === null) ? "—" : (od ? `เลยกำหนด ${Math.abs(daysLeft)} วัน` : (daysLeft === 0 ? "ครบกำหนดวันนี้" : `เหลือ ${daysLeft} วัน`));

  const deptHtml = (t.deptStages || []).length ? t.deptStages.map(stg => {
    const d = getDept(stg.deptId) || { name: "?", color: "#888" };
    const dp = deptProgress(t, stg.deptId), done = isDeptComplete(t, stg.deptId), uses = dp.total > 0;
    const sod = stg.due && stg.due < today && !done;
    const pc = uses ? Math.round(dp.done / dp.total * 100) : (done ? 100 : 0);
    const val = `${uses ? `${dp.done}/${dp.total}` : (done ? "เสร็จ" : "—")}${stg.due ? ` · ${sod ? "เลย " : ""}${formatDateTH(stg.due)}` : ""}`;
    return `
      <div class="dash-pd-cab${done ? ' done' : ''}">
        <span class="dash-pd-dot" style="background:${d.color}"></span>
        <span class="dash-pd-name">${escapeHtml(d.name)}${done ? ' ✓' : ''}</span>
        ${dashBar(pc, done ? '#10b981' : d.color)}
        <span class="dash-pd-val"${sod ? ' style="color:var(--danger);font-weight:700"' : ''}>${val}</span>
      </div>`;
  }).join("") : `<div class="muted" style="font-size:12px;padding:6px 2px">ยังไม่มีด่านแผนก</div>`;

  const cabHtml = (t.subtasks || []).length ? t.subtasks.map(s => {
    const p = checklistProgress(s), cst = getStatus(s.statusId);
    const cdone = p.total > 0 ? p.done === p.total : isStatusDone(cst);
    const pc = p.total ? Math.round(p.done / p.total * 100) : (cdone ? 100 : 0);
    return `
      <div class="dash-pd-cab${cdone ? ' done' : ''}">
        <span class="dash-pd-dot" style="background:${cst.color}"></span>
        <span class="dash-pd-name">${escapeHtml(s.text || "(ไม่มีชื่อตู้)")}</span>
        ${dashBar(pc, cdone ? '#10b981' : cst.color)}
        <span class="dash-pd-val">${p.total ? `${p.done}/${p.total}` : (cdone ? '✓' : '—')}</span>
      </div>`;
  }).join("") : `<div class="muted" style="font-size:12px;padding:6px 2px">ยังไม่มีตู้</div>`;

  const counts = subStatusCounts(t);
  const sbreak = state.statuses.filter(s => counts[s.id]).map(s =>
    `<span class="dash-sb" style="background:${s.color};color:${textOn(s.color)}">${escapeHtml(s.name)} ${counts[s.id]}</span>`).join("");

  const overlay = document.createElement("div");
  overlay.className = "overlay";
  overlay.innerHTML = `
    <div class="modal dash-modal" role="dialog" aria-modal="true">
      <div class="modal-head">
        <h3>📊 ${escapeHtml(t.title)}</h3>
        <button class="btn btn-ghost" data-act="close" title="ปิด">✕</button>
      </div>
      <div class="dash-mbody">
        <div class="dash-pd-top">
          <div class="dash-pd-pct" style="color:${pp.pct === 100 ? '#10b981' : 'var(--accent)'}">${pp.pct}%</div>
          <div class="dash-pd-meta">
            <div><b>สถานะ:</b> <span style="color:${st.color};font-weight:700">${escapeHtml(st.name)}</span>${comp ? ' · <b style="color:#10b981">เสร็จทุกแผนก ✓</b>' : ''}</div>
            <div><b>กำหนด:</b> ${start ? `${formatDateTH(start)} → ` : ''}${t.date ? formatDateTH(t.date) : '—'} · <span style="${od ? 'color:var(--danger);font-weight:700' : ''}">${dueText}</span></div>
            <div><b>เช็คลิสต์รวม:</b> ${pp.done}/${pp.total}${pr.id !== 'none' ? ` · ความสำคัญ ${escapeHtml(pr.label)}` : ''}</div>
          </div>
        </div>
        <div class="dash-pd-h">ความคืบหน้าตามแผนก (workflow)</div>
        ${deptHtml}
        <div class="dash-pd-h">ตู้ (${(t.subtasks || []).length})</div>
        ${cabHtml}
        ${sbreak ? `<div class="dash-sbreak">${sbreak}</div>` : ''}
      </div>
      <div class="modal-foot">
        <button class="btn dash-print-hide" data-act="print" title="พิมพ์ / บันทึกเป็น PDF" style="margin-right:auto">🖨️ พิมพ์ / PDF</button>
        <button class="btn" data-act="open-task">เปิดงาน</button>
        <button class="btn btn-primary" data-act="close">ปิด</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  const close = () => { overlay.remove(); document.removeEventListener("keydown", onEsc, true); };
  function onEsc(e) { if (e.key === "Escape") close(); }
  overlay.addEventListener("click", e => { if (e.target === overlay) close(); });
  overlay.querySelectorAll('[data-act="close"]').forEach(b => b.addEventListener("click", close));
  overlay.querySelector('[data-act="open-task"]').addEventListener("click", () => { close(); openTaskModal(t.id); });
  overlay.querySelector('[data-act="print"]').addEventListener("click", () => {
    overlay.classList.add("print-target");
    document.body.classList.add("printing-modal");
    const cleanup = () => { overlay.classList.remove("print-target"); document.body.classList.remove("printing-modal"); window.removeEventListener("afterprint", cleanup); };
    window.addEventListener("afterprint", cleanup);
    setTimeout(cleanup, 60000);   // safety fallback
    window.print();
  });
  document.addEventListener("keydown", onEsc, true);
}

/* ---------- Work order / delivery sheet (printable, per department) ----------
   Scope = the department(s) currently in view + the day currently in the "ต้องเสร็จ" panel.
   Cabinets due that day for the department are listed; if the department has custom fields,
   they're grouped by the FIRST field's value (e.g. รถขนส่ง → one section per truck). */
function buildWorkOrderSheet(deptId, day) {
  const dept = getDept(deptId); if (!dept) return "";
  const fields = deptFields(deptId);
  const groupField = fields[0] || null;       // group by the first custom field (e.g. รถขนส่ง)
  const otherFields = fields.slice(1);         // remaining fields shown beside each project
  // collect tasks with cabinets (or the project itself) due this day for this department
  const entries = [];
  (state.tasks || []).forEach(t => {
    const stg = taskStage(t, deptId); if (!stg) return;
    const subs = t.subtasks || [];
    const units = subs.length
      ? subs.map(s => ({ sub: s, ed: cabinetDeptDue(t, s, deptId) }))
      : [{ sub: null, ed: stg.due || null }];
    const due = units.filter(u => u.ed === day);
    if (due.length) entries.push({ task: t, stg, cabs: due });
  });
  if (!entries.length) return "";
  // group by the first field's chosen value (unspecified bucket sorts last)
  const UNSET = "␀";
  const groups = new Map();
  entries.forEach(e => {
    const key = groupField ? (stageFieldLabel(groupField, e.stg) || UNSET) : "all";
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(e);
  });
  const keys = [...groups.keys()].sort((a, b) => {
    if (a === UNSET) return 1; if (b === UNSET) return -1;
    return String(a).localeCompare(String(b), "th");
  });
  const boardName = (root.boardMeta.find(b => b.id === root.activeBoard) || {}).name || "";
  let html = `<div class="wo-sheet">
    <div class="wo-head">
      <div class="wo-title">ใบสั่งงาน — ${escapeHtml(dept.name)}</div>
      <div class="wo-meta">${escapeHtml(boardName)} · ${formatDateFullTH(day)}</div>
    </div>`;
  keys.forEach(key => {
    const list = groups.get(key);
    if (groupField) {
      const label = key === UNSET ? `ยังไม่ระบุ${escapeHtml(groupField.name)}` : escapeHtml(key);
      html += `<div class="wo-group-head">${escapeHtml(groupField.name)}: <b>${label}</b><span class="wo-count">${list.length} โปรเจค</span></div>`;
    }
    list.forEach(e => {
      const t = e.task;
      const otherVals = otherFields.map(f => { const v = stageFieldLabel(f, e.stg); return v ? `${escapeHtml(f.name)}: ${escapeHtml(v)}` : null; }).filter(Boolean).join(" · ");
      html += `<div class="wo-proj"><span class="wo-proj-name">${escapeHtml(t.title || "(ไม่มีชื่อ)")}</span>${otherVals ? `<span class="wo-proj-extra">${otherVals}</span>` : ""}</div><div class="wo-rows">`;
      e.cabs.forEach(({ sub, ed }) => {
        if (!sub) {
          html += `<div class="wo-row"><span class="wo-check">☐</span><span class="wo-cab">— ทั้งโปรเจค —</span><span class="wo-status"></span><span class="wo-prog"></span><span class="wo-due">${ed ? formatDateTH(ed) : ""}</span></div>`;
          return;
        }
        const cst = getStatus(sub.statusId);
        const p = checklistProgress(sub, deptId);
        html += `<div class="wo-row">
          <span class="wo-check">☐</span>
          <span class="wo-cab">${escapeHtml(sub.text || "(ไม่มีชื่อตู้)")}</span>
          <span class="wo-status"><span class="wo-dot" style="background:${cst.color}"></span>${escapeHtml(cst.name)}</span>
          <span class="wo-prog">${p.total ? `${p.done}/${p.total}` : ""}</span>
          <span class="wo-due">${ed ? formatDateTH(ed) : ""}</span>
        </div>`;
      });
      html += `</div>`;
    });
  });
  html += `<div class="wo-foot"><span>ผู้รับงาน / ผู้ขับ: ____________________</span><span>ลงชื่อ: ____________________  วันที่ ____ / ____ / ______</span></div></div>`;
  return html;
}

        <div class="row dash-print-hide" style="gap:6px">

/* Gantt / timeline view — one row per project, bar = startDate→due (production span),
   diamonds = each department's due date, vertical line = today. Uses existing data only. */
function renderGantt() {
  const wrap = document.getElementById("ganttWrap");
  document.getElementById("monthLabel").textContent = `${TH_MONTHS[view.month]} ${view.year + 543}`;
  const N = new Date(view.year, view.month + 1, 0).getDate();      // days in month
  const rangeStart = new Date(view.year, view.month, 1);
  const rsIso = isoDate(rangeStart), reIso = isoDate(new Date(view.year, view.month, N));
  const todayStr = todayIso();
  const filter = currentFilter();
  const DAYW = 38;
  const dayIdx = iso => Math.round((fromIso(iso) - rangeStart) / 86400000);

  const prRank = { urgent:4, high:3, medium:2, low:1, none:0 };
  const rows = state.tasks.filter(matchesFilter(filter)).map(t => {
    const start = (t.startDate && t.startDate < t.date) ? t.startDate : t.date;
    return { t, start, due: t.date };
  }).filter(x => x.start <= reIso && x.due >= rsIso)               // intersects this month
    .sort((a,b) => a.start.localeCompare(b.start)
      || (prRank[b.t.priority]||0)-(prRank[a.t.priority]||0)
      || a.t.title.localeCompare(b.t.title, "th"));

  let daysHtml = "", bg = "";
  for (let i = 0; i < N; i++) {
    const d = new Date(view.year, view.month, 1 + i);
    const wknd = ((d.getDay() + 6) % 7) >= 5;
    const isToday = isoDate(d) === todayStr;
    daysHtml += `<div class="g-day${wknd?' wknd':''}${isToday?' today':''}"><span>${1 + i}</span></div>`;
    bg += `<div class="g-cell${wknd?' wknd':''}"></div>`;
  }
  const todayLine = (todayStr >= rsIso && todayStr <= reIso)
    ? `<span class="g-today" style="left:${(dayIdx(todayStr)+0.5)/N*100}%"></span>` : "";

  let rowsHtml = "";
  if (rows.length === 0) {
    rowsHtml = `<div class="g-empty">ไม่มีงานในเดือนนี้</div>`;
  } else rows.forEach(({ t, start, due }) => {
    const st = getStatus(t.statusId);
    const pr = getPriority(t.priority);
    const s = Math.max(0, dayIdx(start));
    const e = Math.min(N - 1, dayIdx(due));
    const left = s / N * 100, width = (e - s + 1) / N * 100;
    const clipL = fromIso(start) < rangeStart;
    const clipR = dayIdx(due) > N - 1;
    const startsToday = start === todayStr;
    // dept-due dots grouped by day; spread same-day dots horizontally so none hides another
    const byDay = {};
    (t.deptStages || []).forEach(stg => {
      if (!stg.due || stg.due < rsIso || stg.due > reIso) return;
      const di = dayIdx(stg.due);
      (byDay[di] = byDay[di] || []).push(stg);
    });
    let markers = "";
    const SP = 16, maxX = N * DAYW - 7;
    Object.keys(byDay).forEach(k => {
      const di = +k, list = byDay[k], cx = (di + 0.5) * DAYW;
      list.forEach((stg, i) => {
        let x = cx + (i - (list.length - 1) / 2) * SP;
        x = Math.max(7, Math.min(maxX, x));
        const dept = getDept(stg.deptId), done = isDeptComplete(t, stg.deptId);
        markers += `<span class="g-marker${done?' done':''}" style="left:${x}px;background:${dept?dept.color:'#888'}" title="${escapeHtml(dept?dept.name:'')} • ${formatDateTH(stg.due)}${done?' ✓':''}"></span>`;
      });
    });
    rowsHtml += `
      <div class="g-row" data-id="${t.id}">
        <div class="g-label" title="${escapeHtml(t.title)}">${pr.id!=='none'?priFlag(pr)+' ':''}${escapeHtml(t.title)}</div>
        <div class="g-track">
          ${bg}${todayLine}
          <div class="g-bar${isStatusDone(st)?' done':''}${clipL?' clip-l':''}${clipR?' clip-r':''}${startsToday?' starts-today':''}"
               style="left:${left}%;width:${width}%;--chip-bg:${hexToBgTint(st.color)};--chip-color:${st.color}"
               title="${escapeHtml(t.title)}&#10;${formatDateTH(start)} → ${formatDateTH(due)}&#10;สถานะ: ${escapeHtml(st.name)}">
            <span class="g-bar-label">${escapeHtml(t.title)}</span>
          </div>
          ${markers}
        </div>
      </div>`;
  });

  wrap.innerHTML = `
    <div class="g-scroll">
      <div class="g-inner" style="--g-dayarea:${N*DAYW}px;--g-label:170px">
        <div class="g-head"><div class="g-corner">โปรเจค</div><div class="g-days">${daysHtml}</div></div>
        <div class="g-rows">${rowsHtml}</div>

/* status report popup shown on app open — own-department progress + remaining checklist per job */
/* ===== Alert system =====
   Alerts are stored inside a task's comments as { type:"alert", toDept, photo, ack, ... }.
   QC (or anyone) sends one from the task's Activity panel → it pops up for the target department. */

/* ----- Browser notifications (Notification API) — configurable per event type in ⚙ การแจ้งเตือน ----- */
const NOTIF_SUPPORTED = typeof window !== "undefined" && "Notification" in window;
// may this event type fire a desktop notification right now?
function canNotify(type) {
  const n = state.settings.notify;
  return NOTIF_SUPPORTED && n && n.enabled && n[type] && Notification.permission === "granted";
}
// is this task relevant to me? (my department is one of its stages — or scope is off / no department set)
function taskRelevantToMe(t) {
  const n = state.settings.notify, my = state.settings.myDept;
  if (!n || !n.onlyMyDept || !my || !getDept(my)) return true;
  return (t.deptStages || []).some(s => s.deptId === my);
}
// fire a desktop notification (no-op if the type is off / permission not granted)
function pushNotify(type, title, body, tag) {
  if (!canNotify(type)) return;
  try { new Notification(title, { body: body || "", tag: tag || undefined }); } catch (e) { /* some engines need a ServiceWorker; ignore */ }
}
// status / done changes on a task (or one of its cabinets)
function notifyStatusChange(t, sub, oldId, newId) {
  if (oldId === newId || !taskRelevantToMe(t)) return;
  const ns = getStatus(newId), os = getStatus(oldId);
  const what = sub ? `ตู้ “${sub.text || "-"}”` : "งาน";
  if (ns.isDone && !os.isDone) pushNotify("done", "✅ เสร็จแล้ว", `${t.title} · ${what}`, "dn-" + (sub ? sub.id : t.id));
  else pushNotify("status", "🔁 เปลี่ยนสถานะ", `${t.title} · ${what} → ${ns.name}`, "st-" + (sub ? sub.id : t.id));
}
// fire status/done notifications for everything that changed between a modal's before/after snapshot
function notifyTaskDiff(before, after) {
  if (!before || !taskRelevantToMe(after)) return;
  if (before.statusId !== after.statusId) notifyStatusChange(after, null, before.statusId, after.statusId);
  (after.subtasks || []).forEach(s => { const b = (before.subtasks || []).find(x => x.id === s.id); if (b && b.statusId !== s.statusId) notifyStatusChange(after, s, b.statusId, s.statusId); });
  (after.deptStages || []).forEach(s => { const b = (before.deptStages || []).find(x => x.deptId === s.deptId); if (b && !b.done && s.done) pushNotify("done", "✅ แผนกเสร็จ", `${after.title} · ${(getDept(s.deptId) || {}).name || ""}`, "dd-" + after.id + s.deptId); });
}

// resize an image File to a JPEG data URL (max ~1000px long edge) to keep localStorage small
function compressImage(file, maxEdge = 1000, quality = 0.6) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        const scale = Math.min(1, maxEdge / Math.max(width, height));
        width = Math.max(1, Math.round(width * scale));
        height = Math.max(1, Math.round(height * scale));
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
// unacknowledged alerts targeted at the user's department (no myDept set = see all departments)
function pendingAlerts() {
  const my = (state.settings.myDept && getDept(state.settings.myDept)) ? state.settings.myDept : null;
  const out = [];
  (state.tasks || []).forEach(t => (t.comments || []).forEach(c => {
    if (c.type === "alert" && !c.ack && (!my || c.toDept === my)) out.push({ task: t, c });
  }));
  return out.sort((a, b) => (b.c.at || 0) - (a.c.at || 0));
}
// does this task have an unacknowledged alert visible to the current user (my department; planner = all)?
function taskHasAlert(t) {
  const my = (state.settings.myDept && getDept(state.settings.myDept)) ? state.settings.myDept : null;
  return (t.comments || []).some(c => c.type === "alert" && !c.ack && (!my || c.toDept === my));
}
// the task's unacknowledged alerts visible to the current user (for the per-task popup)
function taskPendingAlerts(t) {
  const my = (state.settings.myDept && getDept(state.settings.myDept)) ? state.settings.myDept : null;
  return (t.comments || []).filter(c => c.type === "alert" && !c.ack && (!my || c.toDept === my)).map(c => ({ task: t, c }));
}

// reply thread for one alert — reusable in the Activity card and the alert popup.
// `persist` is called after a reply is added (syncs to storage in each context).
function buildAlertReplies(container, task, alertComment, persist) {
  function render() {
    const reps = Array.isArray(alertComment.replies) ? alertComment.replies : [];
    container.innerHTML =
      (reps.length ? `<div class="ar-thread">${reps.map(r =>
        `<div class="ar-reply"><b>${escapeHtml(r.author || "—")}</b> <span class="ar-text">${escapeHtml(r.text)}</span><span class="ar-time">${formatDateTimeTH(r.at)}</span></div>`).join("")}</div>` : "")
      + `<div class="ar-compose"><input type="text" class="ar-input" placeholder="ตอบกลับ..." /><button type="button" class="btn btn-sm ar-send">ตอบ</button></div>`;
    const input = container.querySelector(".ar-input");
    const send = () => {
      const v = input.value.trim(); if (!v) return;
      if (!Array.isArray(alertComment.replies)) alertComment.replies = [];
      alertComment.replies.push({ id: uid("rp"), author: currentUser(), text: v, at: Date.now() });
      persist();
      if (task && taskRelevantToMe(task)) pushNotify("comment", "💬 ตอบกลับ Alert", `${task.title} · ${currentUser()}: ${v}`, "rp-" + alertComment.id);
      render();
      container.querySelector(".ar-input").focus();
    };
    container.querySelector(".ar-send").addEventListener("click", send);
    input.addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); send(); } });
  }
  render();
}

function openStatusReport() {
  const deptId = (state.settings.myDept && getDept(state.settings.myDept)) ? state.settings.myDept : null;
  const deptName = deptId ? (getDept(deptId).name || "") : null;
  const today = todayIso();
  const boardName = (root.boardMeta.find(b => b.id === root.activeBoard) || {}).name || "";

  // checklist progress for a task — scoped to my department, or across all depts when none set
  const prog = t => deptId ? deptProgress(t, deptId)
    : (t.subtasks || []).reduce((a, s) => { const p = checklistProgress(s); a.done += p.done; a.total += p.total; return a; }, { done: 0, total: 0 });
  const isComplete = t => {
    if (deptId) return isDeptComplete(t, deptId);
    const p = prog(t); return p.total > 0 ? p.done === p.total : isStatusDone(getStatus(t.statusId));
  };
  const dueOf = t => deptId ? ((taskStage(t, deptId) || {}).due || t.date) : t.date;

  const scope = state.tasks.filter(t => deptId ? !!taskStage(t, deptId) : true);
  const pending = scope.filter(t => !isComplete(t));
  const doneCount = scope.length - pending.length;
  const prRank = { urgent: 4, high: 3, medium: 2, low: 1, none: 0 };
  pending.sort((a, b) => (dueOf(a) || "9999").localeCompare(dueOf(b) || "9999")
    || (prRank[b.priority] || 0) - (prRank[a.priority] || 0) || a.title.localeCompare(b.title, "th"));

  let totDone = 0, totTotal = 0;
  pending.forEach(t => { const p = prog(t); totDone += p.done; totTotal += p.total; });
  const pct = totTotal ? Math.round(totDone / totTotal * 100) : 0;

  let rowsHtml;
  if (pending.length === 0) {
    rowsHtml = `<div class="rp-empty">🎉<br>ไม่มีงานค้าง${deptName ? ` ของแผนก ${escapeHtml(deptName)}` : ""}</div>`;
  } else {
    rowsHtml = pending.map(t => {
      const p = prog(t), remain = p.total - p.done, pc = p.total ? Math.round(p.done / p.total * 100) : 0;
      const pr = getPriority(t.priority);
      const due = dueOf(t), od = due && due < today;
      const days = od ? Math.round((fromIso(today) - fromIso(due)) / 86400000) : 0;
      const txt = p.total > 0 ? `ติ๊กแล้ว ${p.done} · เหลือ ${remain} · ${pc}%` : "ยังไม่เสร็จ (ไม่มีเช็คลิสต์)";
      // per-cabinet (subtask) breakdown — this department's checklist count, done ones marked
      const subsHtml = (t.subtasks || []).map(s => {
        const sp = checklistProgress(s, deptId);
        const sdone = sp.total > 0 ? sp.done === sp.total : isStatusDone(getStatus(s.statusId));
        const cnt = sp.total > 0 ? `${sp.done}/${sp.total}` : (sdone ? "✓" : "—");
        return `<div class="rp-sub${sdone ? " done" : ""}">
            <span class="rp-sub-dot" style="background:${getStatus(s.statusId).color}"></span>
            <span class="rp-sub-name">${escapeHtml(s.text || "(ไม่มีชื่อตู้)")}</span>
            <span class="rp-sub-cnt">${cnt}</span>
          </div>`;
      }).join("");
      return `
        <div class="rp-row">
          <div class="rp-row-head">
            <span class="rp-title">${pr.id !== "none" ? priFlag(pr) + " " : ""}${escapeHtml(t.title)}</span>
            <span class="rp-due${od ? " overdue" : ""}">${due ? (od ? `เลย ${days} วัน` : formatDateTH(due)) : "—"}</span>
          </div>
          <div class="rp-prog">
            <div class="rp-track"><div class="rp-bar" style="width:${pc}%;background:${pc === 100 ? "#10b981" : "var(--accent)"}"></div></div>
            <span class="rp-prog-text">${txt}</span>
          </div>
          ${subsHtml ? `<div class="rp-subs">${subsHtml}</div>` : ""}
        </div>`;
    }).join("");
  }

  const overlay = document.createElement("div");
  overlay.className = "overlay";
  overlay.innerHTML = `
    <div class="modal report-modal" role="dialog" aria-modal="true">
      <div class="modal-head">
        <h3>📋 รายงานสถานะงาน${deptName ? ` — ${escapeHtml(deptName)}` : ""}</h3>
        <button class="btn btn-ghost" data-act="close" title="ปิด">✕</button>
      </div>
      <div class="report-body">
        <div class="rp-summary">
          <div class="rp-sum-stat"><span class="rp-sum-num">${pending.length}</span><span class="rp-sum-lbl">งานค้าง</span></div>
          <div class="rp-sum-stat"><span class="rp-sum-num">${doneCount}</span><span class="rp-sum-lbl">เสร็จแล้ว</span></div>
          ${totTotal ? `<div class="rp-sum-stat"><span class="rp-sum-num">${pct}%</span><span class="rp-sum-lbl">เช็คลิสต์รวม (${totDone}/${totTotal})</span></div>` : ""}
          <div class="rp-sum-board">📅 ${escapeHtml(boardName)}<br>${formatDateFullTH(today)}</div>
        </div>
        ${deptId ? "" : `<div class="rp-note">ยังไม่ได้ตั้ง “แผนกของฉัน” — ตั้งที่ ⚙ ตั้งค่า › ผู้ใช้ เพื่อดูเฉพาะแผนกของคุณ (ตอนนี้แสดงรวมทุกแผนก)</div>`}
        <div class="rp-list">${rowsHtml}</div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-primary" data-act="close">เริ่มทำงาน</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  const close = () => { overlay.remove(); document.removeEventListener("keydown", onEsc, true); };
  function onEsc(e) { if (e.key === "Escape") close(); }
  overlay.addEventListener("click", e => { if (e.target === overlay) close(); });
  overlay.querySelectorAll('[data-act="close"]').forEach(b => b.addEventListener("click", close));
  document.addEventListener("keydown", onEsc, true);
}

(() => {

    }).sort((a, b) => {
      // exact title-prefix matches first, then by title
      const ai = a.title.toLowerCase().indexOf(q), bi = b.title.toLowerCase().indexOf(q);

          <span class="sd-dot" style="background:${st.color}"></span>
          <span class="sd-title">${pr.id !== "none" ? priFlag(pr) + " " : ""}${highlight(t.title, q)}</span>
          <span class="sd-meta">${t.date ? formatDateShort(t.date) : ""}</span>
        </div>`;
      }).join("");
      dropdown.querySelectorAll(".sd-item").forEach(el => {
        el.addEventListener("mousedown", (e) => { e.preventDefault(); openResult(el.dataset.id); });
        el.addEventListener("mouseenter", () => setActive(+el.dataset.i));
      });
    }
    dropdown.classList.add("open");
  }

  const applySearch = () => {
    searchWrap.classList.toggle("has-text", !!searchEl.value);
    renderMainView();
    renderTodayPanel();
    renderDropdown();
  };
  searchEl.addEventListener("input", applySearch);
  searchEl.addEventListener("focus", () => { if (searchEl.value.trim()) renderDropdown(); });
  searchEl.addEventListener("keydown", (e) => {
    const open = dropdown.classList.contains("open") && results.length > 0;
    if (e.key === "ArrowDown" && open) { e.preventDefault(); setActive((activeIndex + 1) % results.length); }
    else if (e.key === "ArrowUp" && open) { e.preventDefault(); setActive((activeIndex - 1 + results.length) % results.length); }
    else if (e.key === "Enter" && open) { e.preventDefault(); openResult(results[activeIndex >= 0 ? activeIndex : 0].id); }
    else if (e.key === "Escape") {
      if (dropdown.classList.contains("open")) closeDropdown();
      else { searchEl.value = ""; applySearch(); searchEl.blur(); }
    }
  });
  clearBtn.addEventListener("click", () => { searchEl.value = ""; applySearch(); searchEl.focus(); });
  document.addEventListener("mousedown", (e) => { if (!searchWrap.contains(e.target)) closeDropdown(); });
})();

document.getElementById("priorityFilter").addEventListener("click", (e) => {
  const b = e.target.closest("[data-pri]");
  if (!b) return;
  document.querySelectorAll("#priorityFilter [data-pri]").forEach(x => x.classList.remove("active"));
  b.classList.add("active");
  state.settings.filterPriority = b.dataset.pri;
  saveState();
  renderMainView();
  renderTodayPanel();
});

document.getElementById("calGrid").addEventListener("click", (e) => {
  const add = e.target.closest(".cell-add");
  if (add) { e.stopPropagation(); openTaskModal(null, { date: add.dataset.date }); return; }
  // click empty area of a cell -> open day detail
  const cell = e.target.closest(".cal-cell");
  if (cell && (e.target === cell || e.target.classList.contains("cell-tasks"))) openDayModal(cell.dataset.date);
});

// Export/Import are now inside the settings modal; the hidden file input stays global.
document.getElementById("fileImport").addEventListener("change", (e) => {
  const f = e.target.files[0];
  if (f) importJson(f);
  e.target.value = "";
});

// keyboard shortcuts
document.addEventListener("keydown", (e) => {
  if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
  if (e.key === "n" || e.key === "N") openTaskModal(null);
  if (e.key === "t" || e.key === "T") document.getElementById("btnToday").click();
  if (e.key === "ArrowLeft") document.getElementById("btnPrev").click();
  if (e.key === "ArrowRight") document.getElementById("btnNext").click();
});

// seed sample on first run
if (state.tasks.length === 0 && !localStorage.getItem(STORAGE_KEY)) {
  const t = new Date();
  const sampleDate = isoDate(t);
  state.tasks.push({
    id: uid("t"),
    title: "ตัวอย่าง: ตรวจสอบตู้ MDB",
    description: "นี่คืองานตัวอย่าง คลิกเพื่อแก้ไข หรือคลิก + ที่ช่องวันเพื่อสร้างงานใหม่",
    date: sampleDate,
    statusId: "s_doing",
    priority: "high",
    labels: ["ตัวอย่าง", "MDB"],
    subtasks: [
      { id: uid("st"), text: "ตู้ MDB-01", statusId: "s_doing", date: null, checklist: makeCabinetChecklist() },
      { id: uid("st"), text: "ตู้ MDB-02", statusId: "s_todo",  date: null, checklist: makeCabinetChecklist() },
    ],
    deptStages: [{ deptId: "d_qc", due: sampleDate, done: false }],
    comments: [],
    createdAt: Date.now(),
    updatedAt: Date.now(),
  });
  saveState();
}

renderAll();
// on app open: urgent department alerts take precedence over the routine status report
if (pendingAlerts().length) openAlertPopup();
else if (state.tasks.length) openStatusReport();
</script>
</body>
</html>
